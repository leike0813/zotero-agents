name: Publish Content Feed

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-content-feed:
    if: github.repository == 'leike0813/zotero-agents'
    runs-on: ubuntu-latest
    env:
      CONTENT_FEED_GITHUB_REPO: leike0813/zotero-agents-workflows
      RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
    steps:
      - name: Setup JS
        uses: zotero-plugin-dev/workflows/setup-js@main

      - name: Initialize content submodules
        run: git submodule update --init --recursive

      - name: Build content feeds
        run: npm run build:content-feed -- --channels stable,beta,dev

      - name: Upload content feed artifact
        uses: actions/upload-artifact@v4
        with:
          name: content-packages
          path: artifact/content-packages

      - name: Check content feed publish token
        run: |
          if [ -z "${RELEASE_PAT}" ]; then
            echo "RELEASE_PAT secret is required to publish zotero-agents-workflows from this repository." >&2
            exit 1
          fi

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ env.RELEASE_PAT }}
        run: |
          VERSION="$(node -e "const fs=require('fs'); const d=JSON.parse(fs.readFileSync('content-package.version.json','utf8')); console.log(process.env.CONTENT_PACKAGE_VERSION || d.version)")"
          TAG="official-workflows-v${VERSION}"
          if ! gh release view "${TAG}" --repo "${CONTENT_FEED_GITHUB_REPO}" >/dev/null 2>&1; then
            gh release create "${TAG}" --repo "${CONTENT_FEED_GITHUB_REPO}" --title "Official Workflow Package ${VERSION}" --notes "Official Zotero Agents Workflow package ${VERSION}."
          fi
          gh release upload "${TAG}" artifact/content-packages/*/packages/*.zip artifact/content-packages/*/packages/*.zip.sha256 --repo "${CONTENT_FEED_GITHUB_REPO}" --clobber

      - name: Publish Gitee release assets
        if: env.GITEE_TOKEN != ''
        run: |
          VERSION="$(node -e "const fs=require('fs'); const d=JSON.parse(fs.readFileSync('content-package.version.json','utf8')); console.log(process.env.CONTENT_PACKAGE_VERSION || d.version)")"
          TAG="official-workflows-v${VERSION}"
          node --import tsx scripts/sync-gitee-release.ts \
            --repo leike0813/zotero-agents-workflows \
            --tag "${TAG}" \
            --name "Official Workflow Package ${VERSION}" \
            --body "Official Zotero Agents Workflow package ${VERSION}." \
            --target content-feed \
            artifact/content-packages/*/packages/*.zip \
            artifact/content-packages/*/packages/*.zip.sha256

      - name: Publish content-feed branch to GitHub content repo
        run: |
          rm -rf content-feed-publish
          mkdir content-feed-publish
          git -C content-feed-publish init
          git -C content-feed-publish remote add origin "https://x-access-token:${RELEASE_PAT}@github.com/${CONTENT_FEED_GITHUB_REPO}.git"
          git -C content-feed-publish fetch origin content-feed || true
          if git -C content-feed-publish rev-parse --verify FETCH_HEAD >/dev/null 2>&1; then
            git -C content-feed-publish checkout -B content-feed FETCH_HEAD
            find content-feed-publish -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          else
            git -C content-feed-publish checkout --orphan content-feed
          fi
          for channel_dir in artifact/content-packages/*; do
            channel="$(basename "${channel_dir}")"
            mkdir -p "content-feed-publish/${channel}"
            cp "${channel_dir}/feed.json" "content-feed-publish/${channel}/feed.json"
          done
          cat > content-feed-publish/README.md <<EOF
          # Zotero Agents Official Workflow Feed

          Generated from ${GITHUB_REPOSITORY}@${GITHUB_SHA}.

          Feed URLs:

          - stable: https://raw.githubusercontent.com/${CONTENT_FEED_GITHUB_REPO}/content-feed/stable/feed.json
          - beta: https://raw.githubusercontent.com/${CONTENT_FEED_GITHUB_REPO}/content-feed/beta/feed.json
          - dev: https://raw.githubusercontent.com/${CONTENT_FEED_GITHUB_REPO}/content-feed/dev/feed.json
          EOF
          git -C content-feed-publish add -A
          git -C content-feed-publish config user.name "github-actions[bot]"
          git -C content-feed-publish config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C content-feed-publish commit -m "publish content feed ${GITHUB_SHA}" || exit 0
          git -C content-feed-publish push origin content-feed

      - name: Publish content-feed branch to Gitee mirror
        if: env.GITEE_TOKEN != ''
        run: |
          rm -rf content-feed-gitee
          mkdir content-feed-gitee
          git -C content-feed-gitee init
          git -C content-feed-gitee remote add origin "https://oauth2:${GITEE_TOKEN}@gitee.com/leike0813/zotero-agents-workflows.git"
          git -C content-feed-gitee fetch origin content-feed || true
          if git -C content-feed-gitee rev-parse --verify FETCH_HEAD >/dev/null 2>&1; then
            git -C content-feed-gitee checkout -B content-feed FETCH_HEAD
            find content-feed-gitee -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          else
            git -C content-feed-gitee checkout --orphan content-feed
          fi
          for channel_dir in artifact/content-packages/*; do
            channel="$(basename "${channel_dir}")"
            mkdir -p "content-feed-gitee/${channel}"
            cp "${channel_dir}/feed.json" "content-feed-gitee/${channel}/feed.json"
          done
          cat > content-feed-gitee/README.md <<EOF
          # Zotero Agents Official Workflow Feed

          Generated from ${GITHUB_REPOSITORY}@${GITHUB_SHA}.
          EOF
          git -C content-feed-gitee add -A
          git -C content-feed-gitee config user.name "github-actions[bot]"
          git -C content-feed-gitee config user.email "actions@github.com"
          git -C content-feed-gitee commit -m "publish content feed ${GITHUB_SHA}" || exit 0
          git -C content-feed-gitee push origin content-feed
