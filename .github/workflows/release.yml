name: Release

on:
  push:
    tags:
      - v**

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  HOST_BRIDGE_CLI_PREBUILD_TAG: host-bridge-cli-prebuilds

jobs:
  create-release:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || github.token }}
      GH_TOKEN: ${{ secrets.RELEASE_PAT || github.token }}
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
    steps:
      - name: Setup JS
        uses: zotero-plugin-dev/workflows/setup-js@main

      - name: Initialize content submodules
        run: git submodule update --init --recursive

      - name: Download Host Bridge CLI prebuilds
        run: |
          mkdir -p .scaffold/host-bridge-cli-prebuilds
          gh release download "${HOST_BRIDGE_CLI_PREBUILD_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "zotero-bridge-*.zip" \
            --dir .scaffold/host-bridge-cli-prebuilds
          for archive in .scaffold/host-bridge-cli-prebuilds/zotero-bridge-*.zip; do
            unzip -o "${archive}" -d .
          done
          chmod +x addon/bin/darwin-*/zotero-bridge addon/bin/linux-*/zotero-bridge

      - name: Verify Host Bridge CLI prebuilds
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const expected = [
            ['win32-x64', 'zotero-bridge.exe'],
            ['darwin-x64', 'zotero-bridge'],
            ['darwin-arm64', 'zotero-bridge'],
            ['linux-x86', 'zotero-bridge'],
            ['linux-x64', 'zotero-bridge'],
            ['linux-arm', 'zotero-bridge'],
            ['linux-arm64', 'zotero-bridge'],
          ];
          const missing = [];
          for (const [platform, binary] of expected) {
            for (const file of [binary, `${binary}.sha256`]) {
              const target = path.join('addon', 'bin', platform, file);
              if (!fs.existsSync(target)) {
                missing.push(target);
              }
            }
          }
          if (missing.length) {
            console.error(`Missing Host Bridge CLI prebuilds:\n${missing.join('\n')}`);
            process.exit(1);
          }
          NODE

      - name: Check Host Bridge CLI prebuild freshness
        run: npm run check:host-bridge-cli-prebuild-freshness

      - name: Run release gate
        run: npm run test:gate:release

      - name: Verify content package release
        run: npm run check:content-package-release

      - name: Build plugin
        run: npm run build

      - name: Release plugin
        run: npm run release

      - name: Push release refs to Gitee
        if: env.GITEE_TOKEN != ''
        run: |
          git fetch --force origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"
          git remote remove gitee 2>/dev/null || true
          git remote add gitee "https://leike0813:${GITEE_TOKEN}@gitee.com/leike0813/zotero-agents.git"
          git push gitee "HEAD:refs/heads/main" "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"

      - name: Sync plugin release to Gitee
        if: env.GITEE_TOKEN != ''
        run: |
          VERSION="$(node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); console.log(pkg.version)")"
          TAG="v${VERSION}"
          RELEASE_NAME="$(gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" --json name --jq .name)"
          RELEASE_BODY="$(gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" --json body --jq .body)"
          RELEASE_PRERELEASE="$(gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" --json isPrerelease --jq .isPrerelease)"
          METADATA_NAME="$(gh release view release --repo "${GITHUB_REPOSITORY}" --json name --jq .name)"
          METADATA_BODY="$(gh release view release --repo "${GITHUB_REPOSITORY}" --json body --jq .body)"
          METADATA_PRERELEASE="$(gh release view release --repo "${GITHUB_REPOSITORY}" --json isPrerelease --jq .isPrerelease)"
          node --import tsx scripts/sync-gitee-release.ts \
            --repo leike0813/zotero-agents \
            --tag "${TAG}" \
            --name "${RELEASE_NAME}" \
            --body "${RELEASE_BODY}" \
            --prerelease "${RELEASE_PRERELEASE}" \
            --target "${GITHUB_SHA}" \
            .scaffold/build/*.xpi
          node --import tsx scripts/sync-gitee-release.ts \
            --repo leike0813/zotero-agents \
            --tag release \
            --name "${METADATA_NAME}" \
            --body "${METADATA_BODY}" \
            --prerelease "${METADATA_PRERELEASE}" \
            --target "${GITHUB_SHA}" \
            .scaffold/build/update.json \
            .scaffold/build/update-beta.json
