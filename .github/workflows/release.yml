name: Release

on:
  push:
    tags:
      - v**

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  HOST_BRIDGE_CLI_PREBUILD_TAG: host-bridge-cli-prebuilds

jobs:
  create-release:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || github.token }}
      GH_TOKEN: ${{ secrets.RELEASE_PAT || github.token }}
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
    steps:
      - name: Setup JS
        uses: zotero-plugin-dev/workflows/setup-js@main

      - name: Download Host Bridge CLI prebuilds
        run: |
          mkdir -p .scaffold/host-bridge-cli-prebuilds
          gh release download "${HOST_BRIDGE_CLI_PREBUILD_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "zotero-bridge-*.zip" \
            --dir .scaffold/host-bridge-cli-prebuilds
          for archive in .scaffold/host-bridge-cli-prebuilds/zotero-bridge-*.zip; do
            unzip -o "${archive}" -d .
          done
          chmod +x addon/bin/darwin-*/zotero-bridge addon/bin/linux-*/zotero-bridge

      - name: Verify Host Bridge CLI prebuilds
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const expected = [
            ['win32-x64', 'zotero-bridge.exe'],
            ['darwin-x64', 'zotero-bridge'],
            ['darwin-arm64', 'zotero-bridge'],
            ['linux-x86', 'zotero-bridge'],
            ['linux-x64', 'zotero-bridge'],
            ['linux-arm', 'zotero-bridge'],
            ['linux-arm64', 'zotero-bridge'],
          ];
          const missing = [];
          for (const [platform, binary] of expected) {
            for (const file of [binary, `${binary}.sha256`]) {
              const target = path.join('addon', 'bin', platform, file);
              if (!fs.existsSync(target)) {
                missing.push(target);
              }
            }
          }
          if (missing.length) {
            console.error(`Missing Host Bridge CLI prebuilds:\n${missing.join('\n')}`);
            process.exit(1);
          }
          NODE

      - name: Build plugin
        run: npm run build

      - name: Release plugin
        run: npm run release

      - name: Sync plugin release to Gitee
        if: env.GITEE_TOKEN != ''
        run: |
          VERSION="$(node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); console.log(pkg.version)")"
          TAG="v${VERSION}"
          node --import tsx scripts/sync-gitee-release.ts \
            --repo leike0813/zotero-agents \
            --tag "${TAG}" \
            --name "${TAG}" \
            --body "Zotero Agents ${TAG}." \
            .scaffold/build/*.xpi
          node --import tsx scripts/sync-gitee-release.ts \
            --repo leike0813/zotero-agents \
            --tag release \
            --name "Update metadata" \
            --body "This release hosts Zotero Agents update metadata." \
            --prerelease true \
            .scaffold/build/update.json \
            .scaffold/build/update-beta.json
