name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and verify release artifacts without publishing"
        required: true
        type: boolean
        default: true
  push:
    tags:
      - v**

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build-zotero-bridge-cli:
    name: zotero-bridge-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32-x64
            rust-target: x86_64-pc-windows-msvc
            binary: zotero-bridge.exe
          - os: macos-13
            platform: darwin-x64
            rust-target: x86_64-apple-darwin
            binary: zotero-bridge
          - os: macos-latest
            platform: darwin-arm64
            rust-target: aarch64-apple-darwin
            binary: zotero-bridge
          - os: ubuntu-latest
            platform: linux-x86
            rust-target: i686-unknown-linux-gnu
            binary: zotero-bridge
          - os: ubuntu-latest
            platform: linux-x64
            rust-target: x86_64-unknown-linux-gnu
            binary: zotero-bridge
          - os: ubuntu-latest
            platform: linux-arm
            rust-target: armv7-unknown-linux-gnueabihf
            binary: zotero-bridge
          - os: ubuntu-latest
            platform: linux-arm64
            rust-target: aarch64-unknown-linux-gnu
            binary: zotero-bridge
    steps:
      - uses: actions/checkout@v4

      - name: Add Rust target
        run: rustup target add ${{ matrix.rust-target }}

      - name: Set up Zig for Linux cross builds
        if: startsWith(matrix.platform, 'linux-')
        uses: mlugg/setup-zig@v2
        with:
          version: latest

      - name: Install cargo-zigbuild for Linux cross builds
        if: startsWith(matrix.platform, 'linux-')
        run: cargo install cargo-zigbuild --locked

      - name: Build CLI
        run: node scripts/build-zotero-bridge-cli.mjs --platform=${{ matrix.platform }} --target=${{ matrix.rust-target }}

      - name: Check help output
        if: matrix.platform != 'linux-arm' && matrix.platform != 'linux-arm64'
        run: cli/zotero-bridge/target/${{ matrix.rust-target }}/release/${{ matrix.binary }} --help

      - name: Check packaged CLI
        run: |
          node -e "const fs=require('fs'); const p=process.argv[1]; if (!fs.existsSync(p)) { console.error('missing packaged CLI: ' + p); process.exit(1); }" "addon/bin/${{ matrix.platform }}/${{ matrix.binary }}"

      - name: Upload packaged CLI
        uses: actions/upload-artifact@v4
        with:
          name: zotero-bridge-${{ matrix.platform }}
          path: |
            addon/bin/${{ matrix.platform }}/${{ matrix.binary }}
            addon/bin/${{ matrix.platform }}/${{ matrix.binary }}.sha256

  create-release:
    runs-on: ubuntu-latest
    needs:
      - build-zotero-bridge-cli
    env:
      GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || github.token }}
    steps:
      - name: Setup JS
        uses: zotero-plugin-dev/workflows/setup-js@main

      - name: Download Host Bridge CLI prebuilds
        uses: actions/download-artifact@v4
        with:
          pattern: zotero-bridge-*
          merge-multiple: true

      - name: Verify Host Bridge CLI prebuilds
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const expected = [
            ['win32-x64', 'zotero-bridge.exe'],
            ['darwin-x64', 'zotero-bridge'],
            ['darwin-arm64', 'zotero-bridge'],
            ['linux-x86', 'zotero-bridge'],
            ['linux-x64', 'zotero-bridge'],
            ['linux-arm', 'zotero-bridge'],
            ['linux-arm64', 'zotero-bridge'],
          ];
          const missing = [];
          for (const [platform, binary] of expected) {
            for (const file of [binary, `${binary}.sha256`]) {
              const target = path.join('addon', 'bin', platform, file);
              if (!fs.existsSync(target)) {
                missing.push(target);
              }
            }
          }
          if (missing.length) {
            console.error(`Missing Host Bridge CLI prebuilds:\n${missing.join('\n')}`);
            process.exit(1);
          }
          NODE

      - name: Build plugin
        run: npm run build

      - name: Upload dry-run build result
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        uses: actions/upload-artifact@v4
        with:
          name: release-dry-run-build
          path: .scaffold/build

      - name: Release plugin
        if: github.event_name != 'workflow_dispatch' || !inputs.dry_run
        run: npm run release
