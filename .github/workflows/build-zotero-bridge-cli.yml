name: Build Zotero Bridge CLI

on:
  workflow_dispatch:
  push:
    paths:
      - "cli/zotero-bridge/**"
      - "scripts/build-zotero-bridge-cli.mjs"
      - "scripts/package-zotero-bridge-cli.mjs"
      - ".github/workflows/build-zotero-bridge-cli.yml"
  pull_request:
    paths:
      - "cli/zotero-bridge/**"
      - "scripts/build-zotero-bridge-cli.mjs"
      - "scripts/package-zotero-bridge-cli.mjs"
      - ".github/workflows/build-zotero-bridge-cli.yml"

permissions:
  contents: write

env:
  HOST_BRIDGE_CLI_PREBUILD_TAG: host-bridge-cli-prebuilds

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32-x64
            rust-target: x86_64-pc-windows-msvc
            binary: zotero-bridge.exe
          - os: macos-15-intel
            platform: darwin-x64
            rust-target: x86_64-apple-darwin
            binary: zotero-bridge
          - os: macos-latest
            platform: darwin-arm64
            rust-target: aarch64-apple-darwin
            binary: zotero-bridge
          - os: ubuntu-latest
            platform: linux-x86
            rust-target: i686-unknown-linux-gnu
            binary: zotero-bridge
          - os: ubuntu-latest
            platform: linux-x64
            rust-target: x86_64-unknown-linux-gnu
            binary: zotero-bridge
          - os: ubuntu-latest
            platform: linux-arm
            rust-target: armv7-unknown-linux-gnueabihf
            binary: zotero-bridge
          - os: ubuntu-latest
            platform: linux-arm64
            rust-target: aarch64-unknown-linux-gnu
            binary: zotero-bridge

    steps:
      - uses: actions/checkout@v4

      - name: Add Rust target
        run: rustup target add ${{ matrix.rust-target }}

      - name: Set up Zig for Linux cross builds
        if: startsWith(matrix.platform, 'linux-')
        uses: mlugg/setup-zig@v2
        with:
          version: latest

      - name: Install cargo-zigbuild for Linux cross builds
        if: startsWith(matrix.platform, 'linux-')
        run: cargo install cargo-zigbuild --locked

      - name: Build CLI
        run: node scripts/build-zotero-bridge-cli.mjs --platform=${{ matrix.platform }} --target=${{ matrix.rust-target }}

      - name: Check help output
        if: matrix.platform != 'linux-arm' && matrix.platform != 'linux-arm64'
        run: cli/zotero-bridge/target/${{ matrix.rust-target }}/release/${{ matrix.binary }} --help

      - name: Check packaged CLI
        run: |
          node -e "const fs=require('fs'); const p=process.argv[1]; if (!fs.existsSync(p)) { console.error('missing packaged CLI: ' + p); process.exit(1); }" "addon/bin/${{ matrix.platform }}/${{ matrix.binary }}"

      - name: Upload packaged CLI
        uses: actions/upload-artifact@v4
        with:
          name: zotero-bridge-${{ matrix.platform }}
          path: |
            addon/bin/${{ matrix.platform }}/${{ matrix.binary }}
            addon/bin/${{ matrix.platform }}/${{ matrix.binary }}.sha256

  publish-prebuilds:
    name: Publish prebuilds
    runs-on: ubuntu-latest
    needs:
      - build
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    env:
      GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || github.token }}
      GH_TOKEN: ${{ secrets.RELEASE_PAT || github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Download packaged CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: zotero-bridge-*
          merge-multiple: true

      - name: Verify Host Bridge CLI prebuilds
        run: |
          chmod +x addon/bin/darwin-*/zotero-bridge addon/bin/linux-*/zotero-bridge
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const expected = [
            ['win32-x64', 'zotero-bridge.exe'],
            ['darwin-x64', 'zotero-bridge'],
            ['darwin-arm64', 'zotero-bridge'],
            ['linux-x86', 'zotero-bridge'],
            ['linux-x64', 'zotero-bridge'],
            ['linux-arm', 'zotero-bridge'],
            ['linux-arm64', 'zotero-bridge'],
          ];
          const missing = [];
          for (const [platform, binary] of expected) {
            for (const file of [binary, `${binary}.sha256`]) {
              const target = path.join('addon', 'bin', platform, file);
              if (!fs.existsSync(target)) {
                missing.push(target);
              }
            }
          }
          if (missing.length) {
            console.error(`Missing Host Bridge CLI prebuilds:\n${missing.join('\n')}`);
            process.exit(1);
          }
          NODE

      - name: Package prebuild release assets
        run: |
          mkdir -p .scaffold/host-bridge-cli-prebuilds
          for platform in win32-x64 darwin-x64 darwin-arm64 linux-x86 linux-x64 linux-arm linux-arm64; do
            zip -r ".scaffold/host-bridge-cli-prebuilds/zotero-bridge-${platform}.zip" "addon/bin/${platform}"
          done

      - name: Publish prebuild release
        run: |
          cat > .scaffold/host-bridge-cli-prebuilds/release-notes.md <<EOF
          Mutable Host Bridge CLI prebuild bundle for Zotero Agents releases.

          Source commit: ${GITHUB_SHA}
          Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          if gh release view "${HOST_BRIDGE_CLI_PREBUILD_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${HOST_BRIDGE_CLI_PREBUILD_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Host Bridge CLI Prebuilds" \
              --notes-file .scaffold/host-bridge-cli-prebuilds/release-notes.md \
              --prerelease
          else
            gh release create "${HOST_BRIDGE_CLI_PREBUILD_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Host Bridge CLI Prebuilds" \
              --notes-file .scaffold/host-bridge-cli-prebuilds/release-notes.md \
              --prerelease
          fi
          gh release upload "${HOST_BRIDGE_CLI_PREBUILD_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber \
            .scaffold/host-bridge-cli-prebuilds/zotero-bridge-*.zip
