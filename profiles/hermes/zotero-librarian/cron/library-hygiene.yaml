schema: hermes.cron.v1
name: library-hygiene
schedule:
  weekly: monday
  time: "09:30"
command:
  - scripts/zotero_librarian_index_service.py
  - stats
behavior:
  unchanged: "[SILENT]"
  mutation: never
notes:
  - Detect duplicate DOI candidates and duplicate title candidates.
  - Report mojibake titles, excessive tag sets, orphaned items, empty collection candidates, and unusual item type values.
  - Propose actions without applying mutations.
