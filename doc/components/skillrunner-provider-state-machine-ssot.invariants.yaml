invariants:
  - id: INV-PROV-STATE-SETS
    domain: skillrunner-provider
    type: enum
    current_value:
      states:
        - queued
        - running
        - waiting_user
        - waiting_auth
        - succeeded
        - failed
        - canceled
      terminalStates:
        - succeeded
        - failed
        - canceled
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.states
      - SKILLRUNNER_SSOT_FACTS.terminalStates
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: SkillRunner backend state parsing must use the seven canonical backend states; local request_ready is a frontend projection state, not a backend state.

  - id: INV-PROV-WRITE-NONTERMINAL-EVENTS
    domain: skillrunner-provider
    type: write-source
    current_value:
      nonTerminalWriteSource: events
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.nonTerminalWriteSource
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: Non-terminal backend observations must come from backend observation channels and must not be invented by UI or apply code.

  - id: INV-PROV-WRITE-TERMINAL-JOBS
    domain: skillrunner-provider
    type: write-source
    current_value:
      terminalWriteSource: jobs-terminal
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.terminalWriteSource
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: Terminal backend convergence may be confirmed by the jobs endpoint and written only through reconciler settlement.

  - id: INV-PROV-BACKEND-HEALTH-BACKOFF
    domain: skillrunner-provider
    type: timing
    current_value:
      probeBackoffMs:
        - 5000
        - 15000
        - 60000
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.backendHealth.probeBackoffMs
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: Backend health probes must use bounded backoff and stay independent from single-run client errors.

  - id: INV-PROV-BACKEND-HEALTH-THRESHOLDS
    domain: skillrunner-provider
    type: threshold
    current_value:
      failureThresholdForGate: 2
      successThresholdForRecovery: 1
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.backendHealth.failureThresholdForGate
      - SKILLRUNNER_SSOT_FACTS.backendHealth.successThresholdForRecovery
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: Backend gating must require configured probe thresholds; a single run-level terminal client error must not gate the backend.

  - id: INV-PROV-STREAM-EVENT-RUNNING-ONLY
    domain: skillrunner-provider
    type: stream-lifecycle
    current_value:
      eventConnectOnlySnapshot: running
      eventDisconnectStates:
        - waiting_user
        - waiting_auth
        - succeeded
        - failed
        - canceled
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.streamLifecycle.eventConnectOnlySnapshot
      - SKILLRUNNER_SSOT_FACTS.streamLifecycle.eventDisconnectStates
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: Background event observation must be limited to running snapshots and stop at waiting or terminal boundaries.

  - id: INV-PROV-STARTUP-RUNNING-ONLY-RECONNECT
    domain: skillrunner-provider
    type: startup-policy
    current_value:
      autoReconnectSnapshot: running
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.startup.autoReconnectSnapshot
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: Startup reconnect must target active running records only; waiting, terminal, and apply-retry records are reconciler short work.

  - id: INV-PROV-UI-GATING-BACKEND-FLAG
    domain: skillrunner-provider
    type: ui-gating
    current_value:
      flaggedBackendBlocksRunDialog: true
      flaggedBackendHiddenInHome: true
      flaggedBackendTabDisabled: true
      flaggedBackendWorkspaceDisabled: true
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.uiGating
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: Backend health gating must block interactive backend access consistently while preserving stored run projections.

  - id: INV-PROV-NO-LEGACY-ID
    domain: skillrunner-provider
    type: id-governance
    current_value:
      legacyManagedBackendIds: []
      managedLocalBackendId: local-skillrunner-backend
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.legacyManagedBackendIds
      - SKILLRUNNER_SSOT_FACTS.managedLocalBackendId
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: The managed local backend id must remain local-skillrunner-backend with no alternate runtime id.

  - id: INV-PROV-MANAGED-LOCAL-REGISTER-ONLY-AFTER-DEPLOY
    domain: skillrunner-provider
    type: managed-local-gating
    current_value:
      profileCreatePolicy: deploy-only
      probePolicy: probe-only-if-registry-present
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.managedLocal.profileCreatePolicy
      - SKILLRUNNER_SSOT_FACTS.managedLocal.probePolicy
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: The managed local backend profile must be created only after deploy success and probed only when present.

  - id: INV-PROV-APPLY-OWNER-AUTO
    domain: skillrunner-provider
    type: apply-ownership
    current_value:
      autoApplyOwner: reconciler
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.autoApplyOwner
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: SkillRunner auto jobs must be applied only by the reconciler.

  - id: INV-PROV-APPLY-OWNER-INTERACTIVE
    domain: skillrunner-provider
    type: apply-ownership
    current_value:
      interactiveApplyOwner: reconciler
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.interactiveApplyOwner
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: SkillRunner interactive jobs must be applied only by the reconciler.

  - id: INV-PROV-FOREGROUND-APPLY-SKIP-AUTO
    domain: skillrunner-provider
    type: apply-policy
    current_value:
      foregroundAutoApply: skip-and-defer-to-reconciler
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.foregroundAutoApply
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: Workflow summary handling must defer SkillRunner apply to the reconciler and never execute terminal apply for the job itself.

  - id: INV-PROV-SUBMIT-ONLY-REQUEST-READY
    domain: skillrunner-provider
    type: submit-boundary
    current_value:
      providerSubmitBoundary: request_ready
      providerPollsTerminalAfterReady: false
      providerFetchesResultAfterReady: false
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.providerSubmitBoundary
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.providerPollsTerminalAfterReady
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.providerFetchesResultAfterReady
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: SkillRunner provider execution must stop at request_ready after successful create/upload and return deferred.

  - id: INV-PROV-FIRST-VISIBLE-REQUEST-READY
    domain: skillrunner-provider
    type: projection-boundary
    current_value:
      firstVisibleSkillRunnerState: request_ready
      preReadyProjectable: false
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.workspace.firstVisibleSkillRunnerState
      - SKILLRUNNER_SSOT_FACTS.workspace.preReadyProjectable
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: request_ready must be the first user-visible SkillRunner projection point.

  - id: INV-PROV-RESULT-NORMALIZATION-OWNER
    domain: skillrunner-provider
    type: settlement-owner
    current_value:
      resultNormalizationOwner: reconciler
      bundleNormalizationOwner: reconciler
      sequenceContinueOwner: reconciler
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.resultNormalizationOwner
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.bundleNormalizationOwner
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.sequenceContinueOwner
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: Result and bundle normalization must be reconciler-owned settlement work.

  - id: INV-PROV-HOST-FAILURE-VISIBLE
    domain: skillrunner-provider
    type: failure-visibility
    current_value:
      resultParseFailure: visible_failed_apply
      bundleArtifactMissing: visible_failed_apply
      applyHookFailure: visible_failed_apply
      hostBridgeFailure: visible_failed_apply
      storeWriteFailure: diagnostics_and_retry_or_failed_state
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.resultParseFailure
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.bundleArtifactMissing
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.applyHookFailure
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.hostBridgeFailure
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.storeWriteFailure
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: Host-side parse, artifact, apply, Host Bridge, and store failures must settle into visible failed or retry state.

  - id: INV-PROV-APPLY-STATE-SEPARATE
    domain: skillrunner-provider
    type: apply-state
    current_value:
      runStateAxis: backend_run_state
      applyStateAxis:
        - idle
        - pending
        - running
        - succeeded
        - failed
        - skipped
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.runStateAxis
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.applyStateAxis
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: Apply state must be separate from backend run state and remain visible after backend terminal success.
