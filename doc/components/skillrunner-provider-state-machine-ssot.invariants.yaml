invariants:
  - id: INV-PROV-STATE-SETS
    domain: skillrunner-provider
    type: enum
    current_value:
      states:
        - queued
        - running
        - waiting_user
        - waiting_auth
        - succeeded
        - failed
        - canceled
      terminalStates:
        - succeeded
        - failed
        - canceled
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.states
      - SKILLRUNNER_SSOT_FACTS.terminalStates
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: SkillRunner backend state parsing must use the seven canonical backend states; request_ready is a submit phase, not a backend or visible lifecycle state.

  - id: INV-PROV-WRITE-NONTERMINAL-EVENTS
    domain: skillrunner-provider
    type: write-source
    current_value:
      nonTerminalWriteSource: events
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.nonTerminalWriteSource
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: Non-terminal backend observations must come from backend observation channels and must not be invented by UI or apply code.

  - id: INV-PROV-WRITE-TERMINAL-JOBS
    domain: skillrunner-provider
    type: write-source
    current_value:
      terminalWriteSource: jobs-terminal
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.terminalWriteSource
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: Terminal backend convergence may be confirmed by the jobs endpoint and written by foreground single-job, sequence, or foreground continuation settlement; recovery does not own terminal apply.

  - id: INV-PROV-BACKEND-HEALTH-BACKOFF
    domain: skillrunner-provider
    type: timing
    current_value:
      probeBackoffMs:
        - 15000
        - 30000
        - 60000
        - 120000
        - 300000
        - 600000
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.backendHealth.probeBackoffMs
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: Backend health probes must use bounded backoff and stay independent from single-run client errors.

  - id: INV-PROV-BACKEND-REACHABILITY-POLICY
    domain: skillrunner-provider
    type: reachability-policy
    current_value:
      probeTickMs: 60000
      recentSuccessSkipMs: 60000
      autoDisableAfterMs: 21600000
      submitVisibility: enabled_and_reachable
      recoveryTrigger: unreachable_to_reachable
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.backendHealth.probeTickMs
      - SKILLRUNNER_SSOT_FACTS.backendHealth.recentSuccessSkipMs
      - SKILLRUNNER_SSOT_FACTS.backendHealth.autoDisableAfterMs
      - SKILLRUNNER_SSOT_FACTS.backendHealth.submitVisibility
      - SKILLRUNNER_SSOT_FACTS.backendHealth.recoveryTrigger
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: SkillRunner backend submission visibility must require enabled and reachable, health probes must be idle-only, and recovery must be triggered by an unavailable-to-reachable transition.

  - id: INV-PROV-STREAM-EVENT-RUNNING-ONLY
    domain: skillrunner-provider
    type: stream-lifecycle
    current_value:
      eventConnectOnlySnapshot: running
      eventDisconnectStates:
        - waiting_user
        - waiting_auth
        - succeeded
        - failed
        - canceled
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.streamLifecycle.eventConnectOnlySnapshot
      - SKILLRUNNER_SSOT_FACTS.streamLifecycle.eventDisconnectStates
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: Background event observation must be limited to running snapshots and stop at waiting or terminal boundaries.

  - id: INV-PROV-STARTUP-RUNNING-ONLY-RECONNECT
    domain: skillrunner-provider
    type: startup-policy
    current_value:
      autoReconnectSnapshot: running
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.startup.autoReconnectSnapshot
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: Startup recovery must hand active running records to foreground continuation; waiting records stay detached and apply-retry records are not retried by recovery.

  - id: INV-PROV-UI-GATING-BACKEND-FLAG
    domain: skillrunner-provider
    type: ui-gating
    current_value:
      unavailableBackendBlocksRunDialog: true
      unavailableBackendHiddenInHome: true
      unavailableBackendTabDisabled: true
      unavailableBackendWorkspaceDisabled: true
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.uiGating
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: Backend reachability gating must block interactive backend access consistently while preserving stored run projections.

  - id: INV-PROV-NO-LEGACY-ID
    domain: skillrunner-provider
    type: id-governance
    current_value:
      legacyManagedBackendIds: []
      managedLocalBackendId: local-skillrunner-backend
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.legacyManagedBackendIds
      - SKILLRUNNER_SSOT_FACTS.managedLocalBackendId
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: The managed local backend id must remain local-skillrunner-backend with no alternate runtime id.

  - id: INV-PROV-MANAGED-LOCAL-REGISTER-ONLY-AFTER-DEPLOY
    domain: skillrunner-provider
    type: managed-local-gating
    current_value:
      profileCreatePolicy: deploy-only
      probePolicy: probe-only-if-registry-present
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.managedLocal.profileCreatePolicy
      - SKILLRUNNER_SSOT_FACTS.managedLocal.probePolicy
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: The managed local backend profile must be created only after deploy success and probed only when present.

  - id: INV-PROV-APPLY-OWNER-AUTO
    domain: skillrunner-provider
    type: apply-ownership
    current_value:
      autoApplyOwner: foreground-orchestrator
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.autoApplyOwner
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: SkillRunner auto ownership must remain with the foreground orchestrator for normal and recovered execution.

  - id: INV-PROV-APPLY-OWNER-INTERACTIVE
    domain: skillrunner-provider
    type: apply-ownership
    current_value:
      interactiveApplyOwner: foreground-orchestrator
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.interactiveApplyOwner
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: SkillRunner interactive ownership must remain with the foreground orchestrator for normal execution, waiting continuation, and recovered execution.

  - id: INV-PROV-FOREGROUND-APPLY-SINGLE
    domain: skillrunner-provider
    type: apply-policy
    current_value:
      foregroundAutoApply: apply-single-terminal-success
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.foregroundAutoApply
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: Workflow summary handling must apply SkillRunner single-job terminal success in the foreground; recovery may only hand work to foreground continuation.

  - id: INV-PROV-SUBMIT-REQUEST-READY-THEN-POLL
    domain: skillrunner-provider
    type: submit-boundary
    current_value:
      providerSubmitBoundary: submit_phase_request_ready
      providerPollsTerminalAfterReady: true
      providerFetchesResultAfterReady: true
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.providerSubmitBoundary
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.providerPollsTerminalAfterReady
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.providerFetchesResultAfterReady
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: SkillRunner single-job provider execution must continue after request_ready to poll terminal state and fetch result or bundle.

  - id: INV-PROV-FIRST-VISIBLE-RUNNING
    domain: skillrunner-provider
    type: projection-boundary
    current_value:
      firstVisibleSkillRunnerState: running
      preReadyProjectable: false
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.workspace.firstVisibleSkillRunnerState
      - SKILLRUNNER_SSOT_FACTS.workspace.preReadyProjectable
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: request_ready must remain a submit phase only; the first user-visible SkillRunner lifecycle projection after submit readiness is running unless a backend waiting or terminal state has already been observed.

  - id: INV-PROV-RESULT-NORMALIZATION-OWNER
    domain: skillrunner-provider
    type: settlement-owner
    current_value:
      resultNormalizationOwner: foreground-provider-continuation
      bundleNormalizationOwner: foreground-provider-continuation
      sequenceContinueOwner: foreground-continuation
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.resultNormalizationOwner
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.bundleNormalizationOwner
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.sequenceContinueOwner
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: Result and bundle normalization must happen in foreground provider or continuation paths; recovery must not fetch or normalize results.

  - id: INV-PROV-RECONCILER-ONE-SHOT-MISSING-CONTEXT
    domain: skillrunner-provider
    type: reconciler-policy
    current_value:
      missingContextIntervalScan: false
      missingContextOneShotBoundaries:
        - startup
        - backend_recovery
        - managed_local_post_up
      missingContextSkipsNonIdleApply: false
      recoveryOwnership: one_shot_handoff
      pollsJobsContinuously: false
      fetchesResults: false
      appliesResults: false
      missingContextOutcome: failed
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.reconciler.missingContextIntervalScan
      - SKILLRUNNER_SSOT_FACTS.reconciler.missingContextOneShotBoundaries
      - SKILLRUNNER_SSOT_FACTS.reconciler.missingContextSkipsNonIdleApply
      - SKILLRUNNER_SSOT_FACTS.reconciler.recoveryOwnership
      - SKILLRUNNER_SSOT_FACTS.reconciler.pollsJobsContinuously
      - SKILLRUNNER_SSOT_FACTS.reconciler.fetchesResults
      - SKILLRUNNER_SSOT_FACTS.reconciler.appliesResults
      - SKILLRUNNER_SSOT_FACTS.reconciler.missingContextOutcome
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: Recovery must not run normal interval jobs polling, must run only at one-shot recovery boundaries, must hand recoverable work to foreground continuation, and must fail missing-context tasks locally without result fetch or apply.

  - id: INV-PROV-HOST-FAILURE-VISIBLE
    domain: skillrunner-provider
    type: failure-visibility
    current_value:
      resultParseFailure: visible_failed_apply
      bundleArtifactMissing: visible_failed_apply
      applyHookFailure: visible_failed_apply
      hostBridgeFailure: visible_failed_apply
      storeWriteFailure: diagnostics_and_retry_or_failed_state
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.resultParseFailure
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.bundleArtifactMissing
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.applyHookFailure
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.hostBridgeFailure
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.storeWriteFailure
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: Host-side parse, artifact, apply, Host Bridge, and store failures must settle into visible failed or retry state.

  - id: INV-PROV-APPLY-STATE-SEPARATE
    domain: skillrunner-provider
    type: apply-state
    current_value:
      runStateAxis: backend_run_state
      applyStateAxis:
        - idle
        - pending
        - running
        - succeeded
        - failed
        - skipped
    code_refs:
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.runStateAxis
      - SKILLRUNNER_SSOT_FACTS.applyOwnership.applyStateAxis
    doc_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    spec_refs:
      - doc/components/skillrunner-provider-state-machine-ssot.md
    must: Apply state must be separate from backend run state and remain visible after backend terminal success.
