schema: synthesis.states_and_events.v3
description: Active state machine, sequence, and event IDs for the hard-cut Synthesis sidecar model.

state_machines:
  - id: sm.reference.canonical
    owner: reference_sidecar_service
    object: canonical_reference
    states: [active, merged, deprecated, needs_attention]
    transitions:
      - { from: active, to: needs_attention }
      - { from: active, to: merged }
      - { from: active, to: deprecated }
      - { from: merged, to: active }
      - { from: deprecated, to: active }
      - { from: needs_attention, to: active }
      - { from: needs_attention, to: merged }
      - { from: needs_attention, to: deprecated }
    forbidden_transitions:
      - from: active
        to: deleted_by_refresh
        reason: active_raw_or_durable_binding_requires_preservation
      - from: merged
        to: active
        reason: explicit_split_retarget_or_import_policy_required

  - id: sm.reference.binding
    owner: reference_binding_review
    object: reference_binding
    states: [candidate, accepted, rejected, stale_target]
    transitions:
      - { from: candidate, to: accepted }
      - { from: candidate, to: rejected }
      - { from: accepted, to: rejected }
      - { from: accepted, to: stale_target }
      - { from: stale_target, to: accepted }
      - { from: rejected, to: candidate }
    forbidden_transitions:
      - from: accepted
        to: deleted_by_refresh
        reason: refresh_must_not_delete_accepted_binding
      - from: candidate
        to: accepted
        reason: weak_candidates_require_review_or_deterministic_policy
      - from: accepted
        to: topic_source_changed
        reason: binding_cache_is_not_topic_freshness

  - id: sm.topic.discovery_hint
    owner: topic_discovery_service
    object: topic_discovery_hint
    states: [open, rejected, superseded]
    transitions:
      - { from: open, to: rejected }
      - { from: rejected, to: open }
      - { from: open, to: superseded }
      - { from: rejected, to: superseded }
    forbidden_transitions:
      - from: rejected
        to: open
        reason: digest_rerun_metadata_hash_drift_or_cache_refresh_must_not_reopen
      - from: open
        to: source_check_changed
        reason: discovery_is_not_freshness

  - id: sm.review.item
    owner: domain_services
    object: review_item
    states: [open, deferred, resolved, rejected, blocked_by_upstream_review, superseded]
    transitions:
      - { from: open, to: deferred }
      - { from: open, to: resolved }
      - { from: open, to: rejected }
      - { from: open, to: blocked_by_upstream_review }
      - { from: deferred, to: open }
      - { from: blocked_by_upstream_review, to: open }
      - { from: open, to: superseded }
      - { from: deferred, to: superseded }
      - { from: resolved, to: superseded }
      - { from: rejected, to: superseded }
    forbidden_transitions:
      - from: resolved
        to: open
        reason: create_new_review_item_instead
      - from: superseded
        to: resolved
        reason: superseded_issue_instance_is_inactive

  - id: sm.override.durable_effect
    owner: domain_services
    object: durable_user_decision
    states: [active, preserved, needs_attention, revoked, orphaned]
    transitions:
      - { from: active, to: preserved }
      - { from: preserved, to: active }
      - { from: active, to: needs_attention }
      - { from: needs_attention, to: active }
      - { from: needs_attention, to: revoked }
      - { from: active, to: revoked }
      - { from: active, to: orphaned }
    forbidden_transitions:
      - from: active
        to: revoked
        reason: cache_refresh_must_not_revoke_user_decision
      - from: preserved
        to: revoked
        reason: explicit_user_reset_import_or_action_required

  - id: sm.cache.projection
    owner: sidecar_cache_service
    object: cache_projection
    runtime_source: synt_cache_basis
    states: [missing, refreshing, ready, stale, failed]
    transitions:
      - { from: missing, to: refreshing }
      - { from: stale, to: refreshing }
      - { from: refreshing, to: ready }
      - { from: refreshing, to: failed }
      - { from: ready, to: stale }
      - { from: failed, to: refreshing }
      - { from: stale, to: missing }
    forbidden_transitions:
      - from: stale
        to: topic_source_changed
        reason: cache_freshness_is_not_topic_freshness
      - from: missing
        to: block_literature_digest
        reason: cache_projection_is_not_required_for_core_digest_workflow
      - from: refreshing
        to: mutate_zotero_library_metadata
        reason: sidecar_cache_refresh_must_not_rewrite_library_facts

  - id: sm.operation.explicit
    owner: explicit_operation_service
    object: explicit_operation
    runtime_source: synt_operation
    states: [submitted, running, waiting, completed, failed, cancelled, archived]
    transitions:
      - { from: submitted, to: running }
      - { from: running, to: waiting }
      - { from: waiting, to: running }
      - { from: running, to: completed }
      - { from: running, to: failed }
      - { from: running, to: cancelled }
      - { from: failed, to: running }
      - { from: completed, to: archived }
      - { from: failed, to: archived }
      - { from: cancelled, to: archived }
    forbidden_transitions:
      - from: submitted
        to: claimed_by_worker
        reason: operations_are_not_work_queue_items
      - from: waiting
        to: running_by_global_drain
        reason: continuation_requires_explicit_operation_control
      - from: submitted
        to: replayed_on_startup
        reason: startup_must_not_resume_hidden_work
      - from: failed
        to: cache_readiness
        reason: terminal_operations_are_not_data_readiness

  - id: sm.topic.source_check
    owner: topic_source_check_service
    object: topic_source_check_diagnostic
    states: [not_checked, running, fresh, changed, missing_source, error, superseded, cleared]
    transitions:
      - { from: not_checked, to: running }
      - { from: fresh, to: running }
      - { from: changed, to: running }
      - { from: missing_source, to: running }
      - { from: running, to: fresh }
      - { from: running, to: changed }
      - { from: running, to: missing_source }
      - { from: running, to: error }
      - { from: error, to: running }
      - { from: fresh, to: superseded }
      - { from: changed, to: superseded }
      - { from: missing_source, to: superseded }
      - { from: error, to: superseded }
      - { from: fresh, to: cleared }
      - { from: changed, to: cleared }
      - { from: missing_source, to: cleared }
      - { from: error, to: cleared }
    forbidden_transitions:
      - from: cache_refresh
        to: running
        reason: source_check_requires_explicit_topic_request
      - from: discovery_hint
        to: changed
        reason: discovery_is_not_source_check

  - id: sm.import.lifecycle
    owner: import_export_service
    object: import_run
    states: [previewing, preview_ready, applying, applied, failed, cancelled]
    transitions:
      - { from: previewing, to: preview_ready }
      - { from: preview_ready, to: applying }
      - { from: preview_ready, to: cancelled }
      - { from: applying, to: applied }
      - { from: applying, to: failed }
      - { from: failed, to: previewing }
    forbidden_transitions:
      - from: previewing
        to: applying
        reason: preview_result_and_confirmation_required
      - from: file_bundle
        to: workbench_hot_path
        reason: import_must_write_through_repository_apis

sequences:
  - id: seq.sidecar.digest_apply_sync
    owner: sidecar_cache_service
    trigger: literature_digest_apply_succeeded
    output: scoped_artifact_reference_and_matching_projection
  - id: seq.topic.source_check
    owner: topic_source_check_service
    trigger: topic_source_check_requested
    output: source_check_diagnostic
  - id: seq.reference.binding_review
    owner: reference_binding_review
    trigger: reference_binding_review_requested
    output: approved_or_rejected_binding_decisions
  - id: seq.reference.sidecar_refresh
    owner: reference_sidecar_service
    trigger: reference_sidecar_refresh_requested
    output: reference_sidecar_ready_and_citation_graph_stale_cache_basis
  - id: seq.graph.cache_rebuild
    owner: citation_graph_cache
    trigger: graph_cache_rebuild_requested
    output: refreshed_graph_projection_and_ready_cache_basis
  - id: seq.graph.layout_rebuild
    owner: citation_graph_layout
    trigger: graph_layout_rebuild_requested
    output: refreshed_layout_for_existing_graph_hash
  - id: seq.discovery.digest_apply_match
    owner: topic_discovery_service
    trigger: digest_applied
    output: bounded_topic_discovery_hints
  - id: seq.graph.related_items_sync
    owner: related_items_sync_operation
    trigger: related_items_sync_requested
    output: zotero_related_items_sync_summary
  - id: seq.import.preview_apply
    owner: import_export_service
    trigger: import_preview_or_apply_requested
    output: dry_run_diff_or_import_result

events:
  source:
    - digest_applied
    - topic_artifact_applied
    - user_review_action_applied
    - graph_cache_rebuild_requested
    - graph_layout_rebuild_requested
    - reference_binding_review_requested
    - reference_sidecar_refresh_requested
    - sidecar_cache_refresh_requested
    - sidecar_cache_repair_requested
    - related_items_sync_requested
    - import_preview_requested
    - import_apply_requested
    - synthesis_reset_requested
    - synthesis_clean_install_reset_requested
  operation:
    - sidecar_artifact_cache_sync
    - reference_binding_review
    - reference_sidecar_refresh
    - graph_cache_rebuild
    - graph_layout_rebuild
    - related_items_sync
    - topic_source_check
    - topic_discovery_apply
    - import_preview
    - import_apply
    - sidecar_reset
  progress:
    - operation_started
    - operation_progress
    - operation_waiting
    - operation_completed
    - operation_failed
    - operation_cancelled
