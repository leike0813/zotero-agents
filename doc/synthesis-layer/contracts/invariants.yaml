schema: synthesis.invariants.v2
description: Active invariant IDs for the hard-cut Synthesis sidecar model.

invariants:
  - id: inv.library.zotero_ssot
    severity: fatal
    statement: Zotero Library is the source of truth for Zotero-owned facts; Synthesis sidecar cache rows must not copy or be treated as authoritative item existence, metadata, tag, collection, note, attachment, or native relation state.
    evidence: Direct source facade tests and Workbench read-path review.

  - id: inv.sidecar.cache_not_sync
    severity: fatal
    statement: Synthesis sidecar projections may be stale and must not require or trigger automatic library-wide synchronization, startup reconcile, dirty-event fan-out, WorkItem execution, WorkRun recovery, or queue drain.
    evidence: Static guard tests and startup/snapshot tests.

  - id: inv.sidecar.old_sync_removed
    severity: fatal
    statement: Active implementation must not create, claim, replay, or expose dirty events, WorkItems, WorkRuns, startup reconcile state, queue meta, or Registry rebuild runs.
    evidence: Repository schema tests, service API tests, and Host Bridge manifest tests.

  - id: inv.sidecar.destructive_cutover
    severity: high
    statement: The Synthesis sidecar schema may drop old synchronization tables without replaying or migrating their rows.
    evidence: Repository migration tests.

  - id: inv.operation.explicit_only
    severity: fatal
    statement: Long-running Synthesis work is represented only by explicit operation records created by workflow apply, user action, protected import/export/reset, or scoped debug command.
    evidence: Operation API tests and Workbench maintenance tests.

  - id: inv.operation.not_queue
    severity: fatal
    statement: Explicit operation records do not support owner-worker claiming, global queue drain, startup replay, queue pause/resume, or hidden retry scheduling.
    evidence: Static guard tests and Host Bridge debug tests.

  - id: inv.workflow.apply_direct_sidecar
    severity: fatal
    statement: Literature digest and reference matching apply hooks write bounded artifact sidecar, raw-reference, canonical-reference, and binding candidate state directly for the affected source_ref and do not record Synthesis update events.
    evidence: Workflow apply tests.

  - id: inv.reference.refresh_two_stage
    severity: fatal
    statement: "Reference sidecar refresh is a two-stage operation: first scan artifact sidecar state and diff references artifact hashes, then extract and reconcile only changed references artifacts."
    evidence: Reference refresh operation tests and Workbench progress tests.

  - id: inv.reference.no_library_fact_projection
    severity: fatal
    statement: Reference sidecar refresh must not rebuild or persist a Synthesis-owned Zotero library item index or binding table as library fact projections.
    evidence: Repository schema tests, migration tests, and static guards.

  - id: inv.reference.refresh_not_graph_rebuild
    severity: fatal
    statement: Reference sidecar refresh must not hide Citation Graph refresh, graph bootstrap, graph rebuild, or related-items sync inside the sidecar transaction; it promotes Reference Sidecar readiness and marks graph/related sync stale with scoped diagnostics.
    evidence: Reference sidecar refresh tests and invariant static guard.

  - id: inv.reference.readiness_cache_basis_only
    severity: fatal
    statement: Workbench and Host Bridge readiness for Reference Sidecar and Citation Graph cache comes from synt_cache_basis, while synt_operation is progress/history only.
    evidence: Cache basis tests, stale failed operation regression tests, and invariant static guard.

  - id: inv.topic.freshness_direct_sources
    severity: fatal
    statement: Topic freshness/source check compares the topic source manifest with current Zotero Library and artifact reads, not with reference cache or graph cache freshness.
    evidence: Topic source-check regression tests.

  - id: inv.topics.workflow_uses_source_facade
    severity: fatal
    statement: Topic create/update primary inputs come from the Host Library / Artifact Facade; Citation Graph metrics are optional enrichment only.
    evidence: Topic workflow input tests.

  - id: inv.discovery.apply_time_only
    severity: high
    statement: Normal discovery hints are generated only by literature-digest apply-time matching or explicit repair, not by Workbench snapshots, cache refresh, graph cache rebuild, or Registry rebuild.
    evidence: Digest apply and discovery tests.

  - id: inv.discovery.rejected_suppression
    severity: high
    statement: Rejected topic-literature discovery hints do not reopen because of digest rerun, metadata hash drift, cache refresh, or graph cache rebuild.
    evidence: Discovery override tests.

  - id: inv.reference.precision_first
    severity: high
    statement: Graph-affecting reference matches require deterministic safe apply or explicit user-approved binding decisions; suggestions do not create graph edges.
    evidence: Reference matcher tests and graph cache tests.

  - id: inv.reference.quality_gate_before_identity
    severity: high
    statement: Deterministic invalid literature-digest reference extraction rows must be filtered before generated references notes are written, and Synthesis sidecar ingestion must not materialize them as raw or canonical reference identities.
    evidence: Literature digest apply tests and sidecar ingestion tests.

  - id: inv.reference.no_matching_metadata_for_citations
    severity: fatal
    statement: literature_matching_metadata is topic-discovery metadata and is not used for literature-to-literature reference resolution.
    evidence: Reference matcher unit tests.

  - id: inv.review.queue_bounded
    severity: high
    statement: Duplicate, dedupe, and reference-resolution review candidates are generated through indexed blocking and bounded per-source limits, not all-pairs expansion.
    evidence: Review candidate generation tests and static guards.

  - id: inv.review.action_short_core_transaction
    severity: high
    statement: Review actions commit durable sidecar decisions in a short transaction and leave expensive cache refresh to explicit operations.
    evidence: Review action integration tests.

  - id: inv.graph.cache_projection
    severity: fatal
    statement: Citation graph nodes, edges, metrics, and layout are cache projections built from active raw references, effective canonical references, reference bindings, and direct Zotero binding checks.
    evidence: Graph cache refresh tests.

  - id: inv.graph.data_rebuild_separate_from_layout
    severity: fatal
    statement: Citation graph data cache rebuild and Citation graph layout rebuild are separate explicit operations; layout rebuild must not repair missing graph data.
    evidence: Workbench UI tests and invariant static guard.

  - id: inv.graph.refresh_not_topic_lifecycle
    severity: fatal
    statement: Graph cache rebuild does not mark topics changed, start topic discovery, or affect topic source-check state.
    evidence: Topic/graph integration tests.

  - id: inv.graph.previous_cache_on_failure
    severity: high
    statement: Failed graph/reference cache refresh keeps the previous active cache readable and stores diagnostics on the explicit operation.
    evidence: Cache refresh failure tests.

  - id: inv.graph.related_items_sync_explicit
    severity: fatal
    statement: Zotero related-items sync runs only as a visible provenance-protected operation after explicit Advanced Matching/proposal paths, explicit/debug sync commands, or a successful manual stale Citation Graph refresh with scoped source refs; digest apply and Reference Sidecar refresh only mark related-items sync stale, and graph cache rebuild never schedules full-library sync automatically.
    evidence: Related-items sync tests.

  - id: inv.graph.related_items_sync_provenance_required
    severity: fatal
    statement: Related-items sync may revoke only Zotero related links that have recorded Synthesis-created provenance and still match current Zotero state; user-created or pre-existing links are never deleted automatically.
    evidence: Related-items sync provenance tests.

  - id: inv.files.no_hot_data_synthesis_writes
    severity: fatal
    statement: Normal startup, snapshot, cache read, graph read, source check read, and discovery read do not write data/synthesis legacy files or start sidecar refresh.
    evidence: File boundary and snapshot tests.

  - id: inv.ui.cache_not_truth
    severity: fatal
    statement: Workbench presents reference/graph sidecar rows as cache or explicit decisions and does not present them as synchronized Zotero Library truth.
    evidence: Workbench UI tests.

  - id: inv.ui.surface_scoped_refresh
    severity: fatal
    statement: Workbench ready, tab selection, progress polling, Zotero Library item notifications, and local review state updates must use shell/chrome/surface-scoped read models and must not construct a full Synthesis UI snapshot; chrome must not read content surface data such as graph overview rows, Index rows, Review evidence, Tag/Concept projections, or Topic Graph data. Clean loaded surfaces must be served from cache on tab switch, and hidden invalidated surfaces must be marked dirty rather than refreshed in the background. Zotero Library metadata dirty must invalidate only UI read-model caches such as Index and must not start Reference Sidecar refresh or change synt_cache_basis readiness.
    evidence: Workbench UI static guards and performance tests.

  - id: inv.ui.review_index_hot_paths_bounded
    severity: fatal
    statement: Index surface reads must bound Zotero parent-item reads and sidecar joins to the current page; default Index rows must expose reference counts rather than full raw-reference arrays. Review surface reads must use the active Review tab and filters to load a bounded proposal/review page, must resolve readable proposal context from summary item reads and bounded raw-reference ids, and must not load unrelated Review Center data or Index sidecar row state.
    evidence: Workbench service hot-path guards and performance tests.

  - id: inv.ui.no_surface_local_global_render
    severity: high
    statement: Surface-local UI mutations must not clear or rebuild the Workbench root; they may update only chrome and the affected surface container.
    evidence: Workbench frontend static guards.

  - id: inv.host_bridge.cache_views
    severity: high
    statement: Host Bridge and MCP registry/graph reads are cache views and must not imply library synchronization or start refresh.
    evidence: Host Bridge/MCP tests and CLI documentation review.

  - id: inv.concepts.overlay_optional
    severity: high
    statement: Concept overlay context is optional and bounded; Concept KB read or ingestion failure does not silently rewrite or invalidate topic artifacts.
    evidence: Concept overlay and topic apply tests.
