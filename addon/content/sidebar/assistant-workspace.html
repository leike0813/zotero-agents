<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zotero Agents Assistant</title>
    <script src="../shared/theme.js"></script>
    <link rel="stylesheet" href="../shared/theme.css" />
    <link rel="stylesheet" href="./assistant-workspace.css" />
  </head>
  <body>
    <main class="assistant-workspace-shell">
      <header class="assistant-workspace-tabbar">
        <nav
          class="assistant-workspace-tabs"
          aria-label="Assistant workspace tabs"
        >
          <button
            id="assistant-tab-acp-chat"
            class="assistant-tab"
            type="button"
            data-tab="acp-chat"
          >
            ACP Chat
          </button>
          <button
            id="assistant-tab-acp-skills"
            class="assistant-tab"
            type="button"
            data-tab="acp-skills"
          >
            ACP Skills
          </button>
          <button
            id="assistant-tab-skillrunner"
            class="assistant-tab"
            type="button"
            data-tab="skillrunner"
          >
            SkillRunner
          </button>
        </nav>
        <button
          id="assistant-workspace-close"
          class="assistant-workspace-close"
          type="button"
          aria-label="Close assistant sidebar"
          title="Close"
        >
          ×
        </button>
      </header>

      <section class="assistant-workspace-body">
        <div
          id="assistant-workspace-loading"
          class="assistant-workspace-loading"
          role="status"
          aria-live="polite"
          aria-label="Loading assistant panel"
        >
          <span
            class="assistant-workspace-loading-spinner"
            aria-hidden="true"
          ></span>
        </div>
        <iframe
          id="assistant-frame-acp-chat"
          class="assistant-frame"
          title="ACP Chat"
          src="./acp-chat.html"
        ></iframe>
        <iframe
          id="assistant-frame-acp-skills"
          class="assistant-frame hidden"
          title="ACP Skills"
          src="./acp-skill-run.html"
        ></iframe>
        <iframe
          id="assistant-frame-skillrunner"
          class="assistant-frame hidden"
          title="SkillRunner"
          src="./run-dialog.html"
        ></iframe>
      </section>
    </main>
    <script src="./assistant-workspace.js"></script>
  </body>
</html>
