<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACP Skill Run</title>
    <script src="../shared/theme.js"></script>
    <link rel="stylesheet" href="../shared/theme.css" />
    <link rel="stylesheet" href="../shared/icons.css?ui=20260614-icons-v1" />
    <link rel="stylesheet" href="../shared/vendor/katex/katex.min.css" />
    <link rel="stylesheet" href="../shared/assistant/assistant-panel-shared.css" />
    <link rel="stylesheet" href="./acp-skill-run.css" />
  </head>
  <body>
    <main class="acp-skill-run-shell asst-panel-shell">
      <header
        id="acp-skill-run-toolbar"
        class="acp-skill-toolbar asst-shell-toolbar"
      ></header>

      <section
        id="acp-skill-run-banner"
        class="acp-skill-banner asst-banner"
      ></section>

      <section
        id="acp-skill-run-drawer"
        class="run-drawer asst-panel-drawer-overlay hidden"
      ></section>

      <section id="acp-skill-run-empty" class="empty-state asst-empty-state">
        Select an ACP skill run to inspect its transcript.
      </section>

      <section
        id="acp-skill-run-main"
        class="acp-skill-run-main asst-panel-main hidden"
      >
        <section
          id="acp-skill-conversation-window"
          class="acp-skill-conversation-window asst-conversation-surface"
        >
          <section
            id="acp-skill-run-transcript"
            class="run-transcript"
          ></section>
          <div
            class="asst-conversation-overlay-menu"
            aria-label="Conversation view"
          >
            <button
              id="acp-skill-chat-mode-plain"
              class="asst-button-compact"
              type="button"
              data-assistant-view-mode="plain"
              aria-label="Plain transcript view"
              aria-pressed="true"
            >
              <span
                class="zs-icon zs-icon-sm asst-view-mode-icon zs-icon-subject"
                aria-hidden="true"
              ></span>
              <span class="asst-view-mode-label">Plain</span>
            </button>
            <button
              id="acp-skill-chat-mode-bubble"
              class="asst-button-compact"
              type="button"
              data-assistant-view-mode="bubble"
              aria-label="Bubble conversation view"
              aria-pressed="false"
            >
              <span
                class="zs-icon zs-icon-sm asst-view-mode-icon zs-icon-forum"
                aria-hidden="true"
              ></span>
              <span class="asst-view-mode-label">Bubble</span>
            </button>
          </div>
        </section>

        <section
          id="acp-skill-run-plan-panel"
          class="acp-skill-plan-region asst-plan-surface hidden"
        ></section>

        <section
          id="acp-skill-run-interaction"
          class="acp-skill-hint-region asst-hint-surface hidden"
        ></section>

        <section
          id="acp-skill-run-reply-form"
          class="acp-skill-reply-zone asst-reply-surface"
        ></section>
      </section>

      <section
        id="acp-skill-run-details"
        class="details-drawer asst-panel-details-overlay hidden"
      ></section>
    </main>
    <script src="../shared/vendor/katex/katex.min.js"></script>
    <script src="../shared/vendor/markdown-it/markdown-it.min.js"></script>
    <script src="../shared/vendor/markdown-it-texmath/texmath.min.js"></script>
    <script src="../shared/assistant/assistant-conversation-view.js"></script>
    <script src="../shared/assistant/assistant-transcript-renderer.js"></script>
    <script src="../shared/assistant/assistant-panel-model.js"></script>
    <script src="../shared/assistant/assistant-panel-renderer.js"></script>
    <script src="./acp-skill-run.js"></script>
  </body>
</html>
