<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACP Chat</title>
    <link rel="stylesheet" href="./assistant-panel-shared.css" />
    <link rel="stylesheet" href="./acp-chat.css" />
    <link rel="stylesheet" href="./vendor/katex/katex.min.css" />
  </head>
  <body>
    <main class="acp-chat-shell asst-panel-shell">
      <header id="acp-chat-toolbar" class="acp-chat-toolbar asst-shell-toolbar"></header>

      <section id="acp-chat-banner" class="acp-chat-banner asst-banner"></section>

      <section id="acp-chat-drawer" class="acp-chat-drawer asst-panel-drawer-overlay hidden"></section>

      <section id="acp-chat-main" class="acp-chat-main asst-panel-main">
        <section
          id="acp-chat-conversation-window"
          class="acp-conversation-window asst-conversation-surface"
        >
          <section id="acp-transcript" class="acp-transcript plain-mode"></section>
          <div
            class="asst-conversation-overlay-menu acp-conversation-overlay-menu"
            role="group"
            aria-label="Chat view"
          >
            <button
              id="acp-chat-mode-plain"
              class="asst-button-compact"
              type="button"
              data-assistant-view-mode="plain"
              aria-label="Plain transcript view"
              aria-pressed="true"
            >
              Plain
            </button>
            <button
              id="acp-chat-mode-bubble"
              class="asst-button-compact"
              type="button"
              data-assistant-view-mode="bubble"
              aria-label="Bubble conversation view"
              aria-pressed="false"
            >
              Bubble
            </button>
          </div>
        </section>

        <section id="acp-chat-plan-panel" class="acp-plan-panel asst-plan-surface hidden"></section>

        <section
          id="acp-chat-interaction"
          class="acp-interaction-notices asst-hint-surface hidden"
        ></section>

        <section id="acp-chat-reply" class="acp-composer asst-reply-surface"></section>
      </section>

      <section
        id="acp-chat-details"
        class="acp-diagnostics-panel asst-panel-details-overlay hidden"
      ></section>
    </main>
    <script src="./vendor/katex/katex.min.js"></script>
    <script src="./vendor/markdown-it/markdown-it.min.js"></script>
    <script src="./vendor/markdown-it-texmath/texmath.min.js"></script>
    <script src="./assistant-conversation-view.js"></script>
    <script src="./assistant-transcript-renderer.js"></script>
    <script src="./assistant-panel-model.js"></script>
    <script src="./assistant-panel-renderer.js"></script>
    <script src="./acp-chat.js"></script>
  </body>
</html>
