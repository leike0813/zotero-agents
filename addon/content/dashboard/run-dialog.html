<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillRunner Workspace</title>
    <link rel="stylesheet" href="./assistant-panel-shared.css" />
    <link rel="stylesheet" href="./run-dialog.css" />
    <link rel="stylesheet" href="./vendor/katex/katex.min.css" />
  </head>
  <body>
    <main id="run-root" class="skillrunner-panel-shell asst-panel-shell">
      <header id="skillrunner-toolbar" class="skillrunner-toolbar asst-shell-toolbar"></header>
      <section id="skillrunner-banner" class="skillrunner-banner asst-banner"></section>
      <section id="skillrunner-drawer" class="skillrunner-drawer hidden"></section>
      <section id="skillrunner-details" class="skillrunner-details hidden"></section>
      <section id="skillrunner-empty" class="empty-state">No SkillRunner task selected.</section>
      <section id="skillrunner-main" class="skillrunner-main hidden">
        <section
          id="skillrunner-conversation-window"
          class="skillrunner-conversation-window asst-conversation-surface"
        >
          <section id="chat-panel" class="skillrunner-transcript"></section>
          <div class="asst-conversation-overlay-menu" aria-label="Conversation view">
            <button
              id="chat-mode-plain"
              class="asst-button-compact"
              type="button"
              data-assistant-view-mode="plain"
              aria-label="Plain transcript view"
              aria-pressed="true"
            >
              Plain
            </button>
            <button
              id="chat-mode-bubble"
              class="asst-button-compact"
              type="button"
              data-assistant-view-mode="bubble"
              aria-label="Bubble conversation view"
              aria-pressed="false"
            >
              Bubble
            </button>
          </div>
        </section>
        <section id="skillrunner-plan" class="skillrunner-plan asst-plan-surface hidden"></section>
        <section id="skillrunner-hint" class="skillrunner-hint asst-hint-surface hidden"></section>
        <section id="reply-form" class="skillrunner-reply asst-reply-surface"></section>
      </section>
    </main>
    <script src="./vendor/katex/katex.min.js"></script>
    <script src="./vendor/markdown-it/markdown-it.min.js"></script>
    <script src="./vendor/markdown-it-texmath/texmath.min.js"></script>
    <script src="./assistant-conversation-view.js"></script>
    <script src="./assistant-transcript-renderer.js"></script>
    <script src="./assistant-panel-model.js"></script>
    <script src="./assistant-panel-renderer.js"></script>
    <script src="./chat_thinking_core.js?v=20260405a"></script>
    <script src="./run-dialog.js"></script>
  </body>
</html>
