<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zotero Skills UI Harness</title>
    <link rel="stylesheet" href="/content/harness/styles.css" />
  </head>
  <body>
    <header class="harness-toolbar" aria-label="Harness controls">
      <div class="harness-toolbar-title">Zotero Skills UI Harness</div>
      <label class="harness-locale-control" for="harness-locale-select">
        <span>Locale</span>
        <select id="harness-locale-select" autocomplete="off">
          <option value="en-US">English</option>
          <option value="zh-CN">简体中文</option>
          <option value="ja-JP">日本語</option>
          <option value="fr-FR">Français</option>
        </select>
      </label>
    </header>
    <main class="harness-frame-layout" aria-label="Zotero Skills UI Harness">
      <section class="harness-primary-frame" aria-label="Workspace">
        <iframe
          id="harness-workspace-frame"
          class="harness-frame"
          title="Workspace"
          src="/content/workspace/index.html"
        ></iframe>
      </section>
      <aside class="harness-sidebar-frame" aria-label="Assistant Sidebar">
        <iframe
          id="harness-assistant-frame"
          class="harness-frame"
          title="Assistant Sidebar"
          src="/content/dashboard/assistant-workspace.html"
        ></iframe>
      </aside>
    </main>
    <script src="/content/harness/harness-host.js"></script>
  </body>
</html>
