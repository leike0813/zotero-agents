contract_version: "0.1.0"
stages:
  stage_00_runtime_setup:
    semantic_goal: "让 runtime 锁定合法 ACP run workspace、初始化 SQLite，并把后续 stage 交给 gate 状态机。"
    execution_steps:
      - "确认当前目录是本次 ACP run workspace，SQLite 路径使用 gate 返回的 `db_path`。"
      - "只执行 gate 返回的 command；这个 stage 不写 payload。"
      - "命令成功后重新运行 gate，读取下一个 stage 指令。"
    quality_checks:
      - "不要把 prompt 里的历史状态当作真源；以 SQLite 和已登记文件为准。"
    common_pitfalls:
      - "不要在非 ACP run workspace 中尝试修补 Host Bridge artifact export。"
      - "不要跳过 setup 直接写 Stage 10 payload。"

  stage_00_runtime_state_check:
    semantic_goal: "校验上一 skill 产生的 DB、handoff 和必需 artifacts，确保当前 skill 只基于持久化状态继续。"
    execution_steps:
      - "读取 gate 返回的 command，并只执行该 command。"
      - "命令成功后重新运行 gate，进入当前 skill 的第一个 payload stage。"
    quality_checks:
      - "当前 skill 的输入必须来自 SQLite、handoff 和文件，不从聊天上下文继承业务状态。"
      - "不要写 payload 来绕过 state check。"
    common_pitfalls:
      - "不要重新生成上游 handoff。"
      - "只依据 gate JSON、当前 stage 指令和当前 runtime 文件判断下一步。"

  stage_10_create_topic_context:
    semantic_goal: "把 topic seed 转成稳定、可查重、可解析的创建意图。"
    execution_steps:
      - "执行 topic list Host read command，读取现有 topic 的 title、description、aliases 和 id。"
      - "用 topic title、aliases、definition 和 scope 明确主题边界。"
      - "只根据已有 topic 的 title、description、aliases 判断重复风险。"
      - "把判断写入 `payload_path`，再使用 gate 返回的 submit command 提交。"
    host_read_commands:
      - command: "<zotero-bridge> topics list --input '{}'"
        purpose: "获取现有 topic 列表，用于 create duplicate check。"
        notes: "只根据返回 topic 的 title、description、aliases 和 id 判断是否同一主题；不要把相关主题直接判为 duplicate。"
    required_read_notes:
      - "topic list 只用于重复检查，不用于扩写最终综述。"
    field_guidance:
      topic_title: "稳定、简短、适合作为 topic identity 的标题；不要写成问题句或临时搜索词。"
      aliases: "常见缩写、别名或同义主题名；没有时写空数组。"
      definition: "说明主题研究对象、核心问题和边界。"
      scope_include: "明确纳入的技术路线、任务、方法族或评价对象。"
      scope_exclude: "容易混淆但不属于本 topic 的邻近主题。"
      duplicate_status: "`none` 表示未发现重复；`possible_duplicate` 表示需谨慎；`duplicate` 表示已有同一主题；`unknown` 表示材料不足。"
      duplicate_candidate_ids: "只填写 Host topic list 中真实存在的候选 id。"
      duplicate_reason: "说明重复判断依据，不能只写“相似”。"
    hard_constraints:
      - "如果 `duplicate_status` 为 `duplicate`，这是 create prepare 的硬门禁失败：不要提交 resolver/workset 或任何后续 payload，不进入 Stage 20。"
      - "硬门禁失败时直接输出符合 `assets/output.schema.json` 的 `topic_synthesis_canceled` 最终业务对象，包含 `status: \"canceled\"`、`reason: \"duplicate_topic\"`、`message`、`topic_seed`，并在可确定时填 `duplicate_topic_id`；sequence runtime 会据此短路后续 steps。"
    quality_checks:
      - "topic boundary 要能指导 resolver 设计。"
      - "重复判断要保守，不能把宽泛相关主题误判为同一 topic。"
    common_pitfalls:
      - "不要把 topic seed 原样复制成 definition。"
      - "不要引用尚未 resolver 的论文作为创建依据。"
    example:
      topic_title: "DETR-style Object Detection"
      aliases: ["DETR", "DETR-family detectors"]
      definition: "继承 DETR 集合预测公式、object queries 和 transformer decoder 匹配机制的 query-based 目标检测方法族。"
      scope_include:
        ["目标检测中的集合预测", "object queries", "DETR 收敛与 query 设计变体"]
      scope_exclude: ["通用 NLP transformer", "非检测任务的 vision transformer"]
      duplicate_status: "none"
      duplicate_candidate_ids: []
      duplicate_reason: "现有 topic 的标题和别名中没有表示同一 DETR-style object detection 方法族的条目。"

  stage_10_update_topic_context:
    semantic_goal: "读取 runtime update audit report，判断是否继续更新；继续时提交只增不改的 resolver proposal。"
    execution_steps:
      - "先读取 `runtime/payloads/update-audit-report.json`；该文件由 Stage 00 runtime 从 get-context digest/audit 读取旧持久化关联文献和 saved triage，不执行 resolver。"
      - "如果 audit report 显示本次无需更新，写 `update_decision.action: cancel`。"
      - "如果继续更新，执行 library index Host read command，必要时分页。"
      - "提交 resolver proposal 时使用简化 Host Bridge resolver payload：`tag`、`collection_key`、`paper_refs` 和可选 `combine`。"
      - "如果 audit report 中 current_resolver 已是简化格式，必须保留全部既有 selector 值，只能新增字段或数组元素；不要携带旧 `mode/query/include/exclude` DSL。"
      - "区分 current_linked_papers、saved_triage、source_materials 和后续 resolver diff：旧关联文献是已持久化 topic 的来源集合，saved_triage 是已有单篇判断覆盖，source_materials 只说明 digest/references/citation-analysis 等 source artifacts 可读。"
      - "把判断写入 `payload_path`，再使用 gate 返回的 submit command 提交。"
    host_read_commands:
      - command: '<zotero-bridge> library-index get --input ''{"cursor":0,"limit":200}'''
        purpose: "读取 Synthesis sidecar cache 的文库索引，用于判断是否向当前 resolver proposal 增加文献条件。"
        notes: "如果返回 has_more/next_cursor，按同一 input shape 继续分页；该命令只辅助 resolver 设计，不代表 resolver result。"
    required_read_notes:
      - "`runtime/payloads/update-audit-report.json` 是本 stage 的当前状态真源。"
      - "library index 用于设计增量 resolver proposal，不要从中手写 resolver result。"
      - "`source_materials.status=complete` 只表示 source artifact cache 可读，不表示 triage 完整、不表示无需更新。"
    field_guidance:
      update_decision: "`cancel` 表示 audit report 未显示需要继续更新；`continue` 表示提交 resolver proposal 并进入 resolver cascade。"
      resolver: "Host Bridge raw resolver payload；使用 `tag`、`collection_key`、`paper_refs` 和可选 `combine`。`combine` 默认 `union` 扩大召回；需要收窄时用 `intersection` 或更精确的 `tag.and/not`。"
      resolver_reasoning: "说明新增条件、边界和可能遗漏，不写跨文献结论。"
    hard_constraints:
      - "如果 Stage 00 已生成 canceled output，直接输出 gate completed result 中的 `topic_synthesis_canceled` 对象，不再写本 stage payload。"
      - "如果 `update_decision.action` 是 `cancel`，不要附带 resolver。"
      - "如果 `update_decision.action` 是 `continue`，必须附带 resolver 和 resolver_reasoning。"
      - "resolver proposal 删除或改写 current_resolver 既有简化 selector 内容时，gate 会拒绝提交。"
      - "如果 continue 后 runtime 执行 updated resolver 得到的 `resolve_diff.added_refs` 为空，这是 update prepare 的 no-op 硬取消条件：直接输出 `topic_synthesis_canceled`，不进入 Stage 30。"
    quality_checks:
      - "更新判断必须引用 audit report 中的 source_materials、discovery、current_linked_papers 或 saved_triage 信息。"
      - "不要把 create 的 duplicate check 逻辑套到 update。"
    common_pitfalls:
      - "不要手写旧基线或 updated resolve；旧基线来自 current_linked_papers，updated resolve 只由本 stage submit 后 runtime 调 Host Bridge 生成。"
      - "不要在 `added_refs=0` 时为了补旧 triage 覆盖而继续 Stage 30；最新规则是没有新增 resolved papers 就取消本次 update。"
      - "不要在本 stage 做 paper triage。"
    example:
      update_decision:
        action: "continue"
        reason: "Audit report shows discovery candidates and an expanded source set is useful."
        message: "Proceeding with a current-state topic update."
      resolver:
        paper_refs: ["1:DETR2020", "1:DINO2022"]
        combine: "union"
      resolver_reasoning: "保留 current_resolver 中已有 paper_refs，并加入 audit/library-index 指向的新候选。"

  stage_20_resolver_and_workset:
    semantic_goal: "设计紧凑 resolver proposal；runtime 负责 resolver、citation metrics 和 filtered artifact export cascade。"
    execution_steps:
      - "执行 library index Host read command，必要时按返回 cursor 分页。"
      - "从 library index 中识别 topic seed 对应的关键词、标签、citekey 或 paper_refs。"
      - "优先写能复现的 resolver 条件；可用 `tag`、`collection_key`、`paper_refs` 单独或组合查询。"
      - "`combine` 默认 `union`，用于扩大召回；需要收窄到同时满足多个 selector 类型时，显式使用 `combine: intersection`。"
      - "用 `resolver_reasoning` 说明为什么这个 resolver 能覆盖 topic 边界。"
      - "提交后由 runtime 写 resolver result、metrics、artifact manifests 和 workset。"
    host_read_commands:
      - command: '<zotero-bridge> library-index get --input ''{"cursor":0,"limit":200}'''
        purpose: "读取 Synthesis sidecar cache 的文库索引，用于设计 resolver proposal。"
        notes: "如果返回 has_more/next_cursor，按同一 input shape 继续分页；该命令只辅助 resolver 设计，不代表 resolver result。"
    required_read_notes:
      - "library index 用于设计 resolver，不要从中手写 resolver result。"
    field_guidance:
      resolver: "Host Bridge raw resolver payload；至少包含 `tag`、`collection_key`、`paper_refs` 之一，可选 `combine: union|intersection`。"
      resolver_reasoning: "说明检索条件、边界和可能遗漏，不写跨文献结论。"
      operation_intent: "create prepare 使用 `create`。"
    quality_checks:
      - "resolver 要服务 topic 边界，而不是最大化召回所有相邻文献。"
      - "不要写 runtime 会生成的 resolver result、citation metrics 或 artifact manifest。"
    common_pitfalls:
      - "不要把 paper title 列表伪造成 resolver output。"
      - "不要在 resolver stage 做 paper triage。"
    example:
      resolver:
        tag:
          and: ["object-detection", "detr"]
        combine: "union"
      resolver_reasoning: "该标签组合面向 DETR-family 目标检测论文，同时避开泛 transformer 论文。"
      operation_intent: "create"

  stage_30_prepare_analysis_context:
    semantic_goal: "为 resolver workset 中每篇文献写 paper-local triage，给后续 runtime context selection 提供可靠输入。"
    hard_constraints:
      - "paper triage 必须由 LLM 逐篇阅读 runtime 导出的 paper artifacts 后手写判断；不得编写或运行脚本来批量抽取、归纳、评分或生成 `assessments`。"
      - "脚本只能执行 gate 返回的 runtime command；Stage 30 payload 的 relevance、quality、core_digest 和 caveats 必须来自 LLM 对单篇材料的判断。"
    subagent_delegation:
      recommendation: "当 workset 包含多篇文献且执行环境支持 subagent 时，推荐把 paper triage 按 paper_ref 分批委派给 subagent；每个 subagent 只处理分配到的单篇或少量文献，主 agent 负责汇总为一个 `assessments[]` payload。"
      constraints:
        - "每个 subagent 只能读取分配给它的 paper artifact 和当前 topic context，不做跨文献综合。"
        - "subagent 只返回 assessment row 草案，不写文件、不运行脚本、不调用 gate。"
        - "主 agent 必须检查每个 row 的 paper_ref、枚举值、理由和 core_digest，再写入 `runtime/payloads/prepare-analysis-context.json`。"
      prompt: |
        你是 topic synthesis Stage 30 的 paper triage subagent。请只处理下面分配给你的 paper_ref 和对应 artifact 内容。

        任务边界：
        - 逐篇阅读分配的 digest、references 和 citation-analysis。
        - 只判断该 paper 与当前 topic 的关系，不做跨文献综合。
        - 不编写或运行脚本，不写文件，不调用 gate。
        - 只返回 JSON 数组；数组中的每个对象必须是一个 assessment row。

        当前 topic：
        <topic_definition_or_scope>

        分配的 paper artifacts：
        <paper_ref_to_artifact_excerpt_or_path>

        输出字段：
        - paper_ref：必须使用分配给你的 paper_ref。
        - relevance_level：core / related / external / irrelevant / unknown。
        - relevance_reason：说明该 paper 与 topic 边界的关系。
        - paper_quality_level：high / medium / low / unknown。
        - paper_quality_reason：说明证据质量。
        - core_digest：一到三句 paper-local 贡献摘要。
        - caveats：数组，记录证据限制或适用边界。
    execution_steps:
      - "先读取 `runtime/payloads/paper-artifacts-manifest-batch-1.json`。"
      - "按 manifest 中每篇 paper 的 `artifacts[].content_file` 读取 digest、references 和 citation-analysis；当前 artifact 文件通常位于 `runtime/payloads/artifacts/`。"
      - "逐篇阅读 digest、references 和 citation-analysis；每次判断只面向当前 paper。"
      - "如果使用 subagent，先按 paper_ref 分配 artifacts，收回 assessment row 草案后由主 agent 统一检查并合并。"
      - "按 gate 指令和 runtime audit 判断需要 triage 的 paper refs；create 通常覆盖所有 resolved papers，update 使用 gate 暴露的 `triage_required_refs`。"
      - "update 的 `triage_required_refs` 来自 updated resolver refs 与 saved triage refs 的覆盖缺口，不只是 resolver diff 中的 added refs。"
      - "如果 update 没有可复用 triage，gate 会要求对 updated resolve 中全部 papers 写 assessment。"
      - "每条 assessment 判断只限该 paper 与 topic 的关系。"
      - "用 `core_digest` 提炼该 paper 对 topic window 的贡献。"
      - "提交后由 runtime 根据 triage、filtered digest、references、citation-analysis 和 citation graph metrics 生成 cross-paper context、external-literature context、context manifest、source evidence index 和 prepare handoff。"
    required_read_notes:
      - "`runtime/payloads/paper-artifacts-manifest-batch-1.json` 是 artifact 索引真源；具体文件以每条 artifact 的 `content_file` 为准。"
      - "`runtime/payloads/artifacts/` 中的 digest/references/citation-analysis 是判断依据；不要依赖大段附件路径。"
      - "LLM 不手写 cross-paper context 或 external-literature context；这些 view 必须由 runtime 从已校验输入生成。"
    runtime_reads:
      - path: "runtime/payloads/paper-artifacts-manifest-batch-1.json"
        produced_by: "Stage 20 submit 的 runtime resolver cascade"
        purpose: "读取每篇 resolved paper 的 artifact manifest，并按 `content_file` 定位 digest、references 和 citation-analysis。"
      - path: "runtime/payloads/artifacts/"
        produced_by: "Stage 20 submit 的 runtime resolver cascade"
        purpose: "读取 manifest 指向的过滤后 digest、references 和 citation-analysis，用于 paper-local triage。"
    field_guidance:
      assessments: "一篇 resolved paper 一条 assessment，`paper_ref` 必须来自当前 workset。"
      relevance_level: "`core` 是主题核心证据；`related` 是相关背景或变体；`external` 主要用于覆盖/补充判断；`irrelevant` 是误召回；`unknown` 是材料不足。"
      relevance_reason: "说明该 paper 与 topic 边界的关系。"
      paper_quality_level: "评价可用证据质量，不等于引用量排序。"
      paper_quality_reason: "说明实验、方法、综述、benchmark 或证据完整性。"
      core_digest: "一到三句说明该 paper 对 topic 的贡献，保持 paper-local。"
      caveats: "记录训练效率、实验范围、artifact 缺失、适用边界等限制。"
    quality_checks:
      - "triage 阶段只抽取单篇事实，不写 taxonomy、timeline、claim 或 future directions。"
      - "每条 assessment 要能支撑后续 context selection。"
      - "不要把 references 或 citation-analysis 内容复制进 `core_digest`；runtime 会把它们分流到 external-literature context。"
    common_pitfalls:
      - "payload 顶层必须是 `assessments`。"
    example:
      assessments:
        - paper_ref: "1:DETR2020"
          relevance_level: "core"
          relevance_reason: "该论文把 object-query set prediction 建立为本 topic 的基线公式。"
          paper_quality_level: "high"
          paper_quality_reason: "该论文给出模型公式，并提供支撑该路线的 benchmark evidence。"
          core_digest: "提出面向目标检测的 transformer-based set prediction，使 object queries 与 bipartite matching 成为后续 DETR-family 工作的核心概念。"
          caveats: ["训练效率限制会影响后续改进工作的解释方式。"]

  stage_40_core_synthesis:
    semantic_goal: "基于 prepare handoff、cross-paper context 和 evidence index 写 topic-level 核心综合分析。"
    execution_steps:
      - "读取 prepare handoff，确认 workset、context manifest 和 evidence index。"
      - "先锁定 prepare handoff 中的 topic_definition 和 scope_boundary；这是当前 topic 的语义边界真源。"
      - "读取 `cross-paper-context.md`，只用 core_analysis context 写 taxonomy、timeline、claims、debates、future directions 和 outline。"
      - "把 workset 当作库内证据覆盖，不要让库内样本密集子域反向改写 topic identity。"
      - "在需要引用论文的对象中使用 `source_paper_refs`，让 runtime 后续关联 source paper。"
      - "提交后 runtime 会生成 concept candidate context，供 KG stage 使用。"
    required_read_notes:
      - "prepare handoff 中的 topic definition、aliases、scope include/exclude 用于确定 topic 的宏观语义范围。"
      - "`runtime/views/cross-paper-context.md` 服务 core analysis，包含 runtime 选择的 filtered digest、paper triage 和 citation graph metrics。"
      - "`runtime/views/source-paper-evidence-index.json` 用于核对可引用的 source_paper_refs。"
    runtime_reads:
      - path: "runtime/handoff/prepare-analysis-context.json"
        produced_by: "create/update prepare 完成 Stage 30 后的 runtime handoff"
      - path: "runtime/views/cross-paper-context.md"
        produced_by: "prepare runtime 在 paper triage submit 后生成"
        purpose: "作为 taxonomy、timeline、claims、debates、future directions 和 outline 的 core analysis context。"
      - path: "runtime/views/source-paper-evidence-index.json"
        produced_by: "prepare runtime 在 paper triage submit 后生成"
        purpose: "核对当前可引用的 source_paper_refs 和短 evidence。"
    field_guidance:
      taxonomy: "解释 topic 语义边界内的研究路线、机制、边界、代表论文、成熟度、优势和局限；如果 workset 只覆盖子域，taxonomy 仍要按 topic 本身的宏观结构组织。"
      timeline_events: "解释历史递进、里程碑和后续影响，不是按年份排序的 bibliography。"
      claims: "topic-level findings；每条应有证据范围、适用边界和 source_paper_refs。"
      improvement_dimension_summary: "概括方法进展的主轴。"
      improvement_dimensions: "解释设计 tradeoff、评价轴和代表路线；单条 dimension 使用 `title` 命名、使用 `analysis` 写正文。"
      concept_candidate_labels: "列出值得交给 KG stage 补全的概念标签。"
      debates: "描述争议轴、不同立场和当前判断；每条使用 `title` 命名争议，用 `current_judgment` 写当前证据下的判断，并附上 `source_paper_refs`。"
      future_directions: "基于当前 source papers 支撑出的研究局限与未来研究方向。每条都要同时说明当前局限、下一步研究推进方向和成立理由。"
      review_outline: "提出针对当前 topic 撰写综述的候选思路和策略。`topic_importance` 说明为什么值得写，`writing_strategies` 给出多种组织综述的方式，`recommended_strategy_id` 指向当前最适合的策略。"
    quality_checks:
      - "不能把单篇摘要拼接成 taxonomy 或 claims。"
      - "不能把库内样本分布当作 topic 定义；样本偏向 DETR/检测时，Computer Vision 仍然是更大的视觉领域。"
      - "future_directions 必须有 source_paper_refs 支撑；workset 未覆盖的宏观方向应通过 review_outline 的写作风险、coverage caveats 和 collection suggestions 表达。"
      - "coverage 和 collection suggestions 留给 finalize，不在 core 阶段使用 external literature context。"
    common_pitfalls:
      - "不要读取或引用当前 stage 必读材料以外的上下文。"
      - "不要把大 topic 收缩成 resolved papers 最密集的子 topic。"
    example:
      taxonomy:
        summary:
          text: "Computer Vision 的宏观结构包括视觉表示学习、图像分类、目标检测、分割、三维视觉、视频理解和视觉语言多模态；当前库内证据主要覆盖检测与分割相关路线。"
        nodes:
          - id: "area:object-detection"
            title: "Object detection"
            definition: "在图像或视频中定位并分类目标，是 Computer Vision 的核心任务之一。"
            core_problem: "在复杂视觉场景中同时完成目标定位、类别识别和实例区分。"
