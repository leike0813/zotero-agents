            source_paper_refs: ["1:DETR", "1:DINO"]
        recommended_strategy_id: "strategy:method-evolution"

  stage_50_kg_enrichment:
    semantic_goal: "把 core synthesis 中的概念候选转成可供 sidecar materialization 的 KG 补全 payload。"
    execution_steps:
      - "读取 concept candidate context。"
      - "读取库中已有 topic 列表。优先执行 `./.zotero-bridge/bin/zotero-bridge topics list --input '{}'`；工作区没有 shim 时执行 `zotero-bridge topics list --input '{}'`。"
      - "为关键概念写 definition、aliases、disambiguation 和 topic relevance。"
      - "以当前 synthesis topic 为出发点，判断每个 target topic 的方向关系：target 更宽、target 更窄、相关、交叉或对照。"
      - "判断关系时使用当前 topic 的语义全集，不使用 workset 最密集子域替代当前 topic。"
      - "把指向已有 topic 的关系写入 existing_topic_relation_proposals，把未来 topic seed 写入 prospective_topic_relation_proposals。"
      - "写 topic matching terms，供 runtime 生成 sidecars。"
    required_read_notes:
      - "`runtime/views/concept-candidate-context.json` 来自已校验 core synthesis，用它核对概念候选。"
      - "`topics list` 返回当前库中已有 topics，以及这些 topic metadata 中保存的 prospective_topic_relation_proposals。"
    runtime_reads:
      - path: "runtime/views/concept-candidate-context.json"
        produced_by: "Stage 40 core synthesis submit 后的 runtime materialization"
        purpose: "读取待补全的概念候选、来源和上下文。"
    field_guidance:
      concept_details: "解释 topic 边界、路线、机制、任务、benchmark、数据集、评价轴或训练信号相关概念。"
      existing_topic_relation_proposals: "只引用 `topics list` 返回的已有 topic_id，写出 relation_type、confidence、rationale 和 source_paper_refs。"
      prospective_topic_relation_proposals: "只写未来可能 synthesis 的 target_topic_seed 和 relation_type。"
      relation_type: "`target_is_broader_topic_candidate` 表示 target 比当前 topic 更宽；`target_is_narrower_topic_candidate` 表示 target 比当前 topic 更窄；`related_topic_candidate` 表示相关但没有清晰包含或交叉；`overlap_topic_candidate` 表示两者部分交叉且互不包含；`contrast_topic_candidate` 表示同一问题空间中的替代路线或对立视角。"
      topic_matching_terms: "用于 topic discovery/matching 的 include、must-have、methods、exclude terms。"
    quality_checks:
      - "KG enrichment 是语义补全，不是重复 core synthesis。"
      - "已有 topic 关系要能对应 list-topics 中的 topic_id。"
      - "所有关系判断都以当前 synthesis topic 指向 target topic 的视角书写。"
      - "如果当前 topic 是 Computer Vision，Object Detection、DETR-style Object Detection 等应按下位或相关 target 判断；不能因为 workset 偏向 DETR 就把当前 topic 改写成 DETR-series。"
      - "如果一个 topic 明确包含另一个 topic，使用 broader/narrower 关系；overlap 只用于互不包含的部分交叉范围。"
      - "预备关系只保留可复用的 topic seed。"
    common_pitfalls:
      - "不要写 canonical KG assets、SQLite rows 或 Git metadata。"
      - "不要把宽泛领域词都加入 must-have terms。"
    example:
      concept_details:
        - label: "Object detection"
          aliases: ["目标检测"]
          concept_type: "task"
          definition: "在图像或视频中定位并识别目标，是 Computer Vision 的下位任务。"
          topic_relevance: "当前 workset 覆盖较多的 Computer Vision 子域。"
      existing_topic_relation_proposals:
        - relation_type: "target_is_narrower_topic_candidate"
          target_topic_id: "object-detection"
          target_topic_title: "Object Detection"
          confidence: 0.88
          rationale: "Object Detection 是 Computer Vision 的下位任务；即使当前 workset 偏向检测，Computer Vision 的语义范围仍更宽。"
          source_paper_refs: ["1:DETR"]
        - relation_type: "target_is_narrower_topic_candidate"
          target_topic_id: "detr-style-object-detection"
          target_topic_title: "DETR-style Object Detection"
          confidence: 0.76
          rationale: "DETR-style Object Detection 是 Computer Vision 中目标检测方向的更窄方法族。"
          source_paper_refs: ["1:DETR"]
      prospective_topic_relation_proposals:
        - target_topic_seed: "query-centric object detection"
          relation_type: "target_is_narrower_topic_candidate"
      topic_matching_terms:
        include_terms: ["DETR", "object queries", "set prediction"]
        must_have_terms: ["object detection"]
        methods: ["Hungarian matching", "transformer decoder"]
        exclude_terms: ["NLP transformers"]

  stage_60_coverage_and_collection_suggestions:
    semantic_goal: "基于 core handoff、finalize context 和 external literature context 判断库内覆盖、可靠性和后续入库方向。"
    execution_steps:
      - "读取 core handoff、finalize context manifest 和 `external-literature-context.md`。"
      - "判断当前库内材料对 topic 的覆盖档位和证据可靠性。"
      - "如果 workset 集中在 topic 的某个子域，把它写成库内样本偏置和 coverage caveat，而不是降低 topic 的语义范围。"
      - "写出 external context summary 和可执行的 collection suggestions。"
      - "提交后 runtime 登记 coverage payload；完整 result sections、synthesis report section 和 manifest 会在 Stage 70 submit 后由 runtime 统一物化。"
    required_read_notes:
      - "`runtime/views/external-literature-context.md` 只服务 finalize 的 coverage、statistics 和入库建议。"
      - "`runtime/views/finalize-context.manifest.json` 用于定位 sidecars 和 finalize 输入。"
    runtime_reads:
      - path: "runtime/views/external-literature-context.md"
        produced_by: "prepare runtime 在 paper triage submit 后生成，并经 core handoff 暴露给 finalize"
        purpose: "用于 coverage、external context summary 和 collection suggestions。"
      - path: "runtime/views/finalize-context.manifest.json"
        produced_by: "Stage 50 KG enrichment submit 后的 runtime materialization"
        purpose: "定位 sidecars 和 finalize 输入 artifact。"
    field_guidance:
      coverage_verdict: "`sufficient`、`partial`、`insufficient`、`severely_missing` 或 `unknown`。"
      coverage_reason: "解释 verdict，区分领域真实空白、库内覆盖不足和 artifact 证据不足。"
      coverage_caveats: "结构化记录证据范围、workset 子域偏置、artifact 缺失、外部文献不足、topic 边界不确定或 graph uncertainty。"
      external_context_summary: "总结外部/邻近文献对 coverage verdict 和 collection suggestions 的影响。"
      suggested_collection_directions: "给出具体补充方向、理由、示例标题或关键词、优先级。"
    quality_checks:
      - "coverage 是对当前库和证据链的解释，不是对整个领域成熟度的绝对判断。"
      - "宏观 topic 的 coverage 要按 topic scope 判断；库内文献集中于 DETR/检测时，应明确 Computer Vision 的其他方向覆盖不足。"
      - "coverage_caveats 描述覆盖限制；基于 source papers 的研究局限和未来方向由 core synthesis 的 future_directions 承担。"
      - "collection suggestions 要具体到方向或示例 term，不能只写“增加更多论文”。"
    common_pitfalls:
      - "不要把 core taxonomy/claims 整段复制到 external_context_summary。"
      - "不要从代表文献数量机械推断统计结论。"
    example:
      coverage_verdict: "partial"
      coverage_reason: "库内已经覆盖 DETR 公式和若干收敛改进变体，但部署与更广 benchmark 覆盖仍不均衡。"
      coverage_caveats:
        - type: "library_coverage_gap"
          note: "效率导向和部署导向的变体覆盖不足。"
      external_context_summary: "外部 context 指向若干邻近 DETR variants 和 surveys，可补强效率与 benchmark comparison 覆盖。"
      suggested_collection_directions:
        - direction: "补充效率导向的 DETR variants。"
          reason: "这些文献能改善部署和 latency tradeoff 的覆盖。"
          example_titles_or_terms: ["DAB-DETR", "Deformable DETR"]
          priority: "medium"

  stage_70_summary:
    semantic_goal: "基于 core handoff、coverage payload 和 finalize context 写最终用户可读 summary。"
    execution_steps:
      - "读取 core handoff、Stage 60 coverage payload 和 finalize context manifest。"
      - "写一个短摘要、一个概览段落和若干 key takeaways。"
      - "保持总结面向用户理解 topic，不新增未在 core/coverage/finalize context 中出现的 claim。"
      - "提交后 runtime 生成完整 Host apply-ready sections、`result/topic-analysis.json` 和最终 `topic_synthesis` 或 canceled 输出。"
    required_read_notes:
      - "`runtime/handoff/core-enrichment.json` 提供 core synthesis 与 KG enrichment 的 handoff 边界。"
      - "`runtime/payloads/coverage-and-collection-suggestions.json` 是 Stage 60 已提交的 coverage 与 external context 结论。"
      - "`runtime/views/finalize-context.manifest.json` 说明 finalize 可用的 sections、sidecars 和上下文文件。"
    runtime_reads:
      - path: "runtime/handoff/core-enrichment.json"
        produced_by: "core enrichment skill Stage 50 submit"
        purpose: "确认 core handoff、sidecars 和 finalize context 已生成。"
      - path: "runtime/payloads/coverage-and-collection-suggestions.json"
        produced_by: "finalize skill Stage 60 payload submit"
        purpose: "复用已 gate 的 coverage verdict、external context summary 和 collection suggestions。"
      - path: "runtime/views/finalize-context.manifest.json"
        produced_by: "core enrichment skill Stage 50 submit"
        purpose: "确认 finalize 可读材料和 sidecar 范围。"
    field_guidance:
      summary_brief: "一到两句，说明 topic 的核心定位和当前 synthesis 结论。"
      summary_overview: "一个较完整段落，连接路线、演进、覆盖和可靠性。"
      key_takeaways: "面向用户行动或理解的要点，每条应具体。"
    quality_checks:
      - "summary 不应替代 result sections，也不应引入新证据。"
      - "key takeaways 要能帮助用户决定如何阅读或补充该 topic。"
      - "不要手写 sections、manifest、sidecars 或 final candidate；这些都是 runtime-owned 输出。"
    common_pitfalls:
      - "不要输出 Markdown fence 或解释性尾注。"
      - "不要手写 final-output candidate。"
    example:
      summary_brief: "DETR-style object detection 以 query-based set prediction 为中心，并围绕如何让该公式更易训练和部署展开。"
      summary_overview: "当前 synthesis 将该 topic 组织为公式、收敛和效率三条路线。库内材料支持核心公式和若干改进方向，但对部署导向变体和更广 benchmark comparison 的覆盖仍是 partial。"
      key_takeaways:
        - "理解该 topic 时应以 set prediction 和 object queries 作为概念入口。"
        - "后续 variants 主要应从收敛、query 设计和效率 tradeoff 解释。"
        - "在判断 collection coverage 充分之前，应补充更多效率导向 variants。"
